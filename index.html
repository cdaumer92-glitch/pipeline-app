<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipeline TexasWin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f7f7;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    :root {
      --tw-teal:       #007d89;
      --tw-teal-light: #e6f4f5;
      --tw-ink:        #1a3535;
      --tw-slate:      #607a7a;
      --tw-muted:      #9eb5b5;
      --tw-border:     #e0ecec;
      --tw-bg:         #f4f7f7;
      --tw-green:      #2ec27e;
      --tw-orange:     #f0932b;
      --tw-red:        #e74c3c;
      --tw-blue:       #3498db;
    }
    /* ── TOPBAR PROTOTYPE ── */
    .tw-topbar {
      height: 52px;
      background: white;
      border-bottom: 1px solid var(--tw-border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 1px 3px rgba(0,125,137,.06);
    }
    .tw-logo {
      font-size: 16px;
      font-weight: 700;
      color: var(--tw-ink);
      letter-spacing: -.4px;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .tw-logo img { height: 28px; }
    .tw-nav { display: flex; gap: 2px; }
    .tw-nav-btn {
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--tw-slate);
      cursor: pointer;
      border: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      transition: all .15s;
      white-space: nowrap;
    }
    .tw-nav-btn:hover { background: var(--tw-teal-light); color: var(--tw-teal); }
    .tw-nav-btn.tw-active { background: var(--tw-teal-light); color: var(--tw-teal); font-weight: 600; }
    .tw-search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--tw-bg);
      border: 1px solid var(--tw-border);
      border-radius: 7px;
      padding: 5px 10px;
      min-width: 220px;
      flex: 1;
      max-width: 320px;
      transition: border-color .15s;
      position: relative;
    }
    .tw-search-box:focus-within { border-color: var(--tw-teal); background: white; }
    .tw-search-box input {
      border: none;
      background: transparent;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--tw-ink);
      width: 100%;
    }
    .tw-search-box input::placeholder { color: var(--tw-muted); }
    .tw-btn-new {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: var(--tw-teal);
      color: white;
      border: none;
      border-radius: 7px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .15s;
    }
    .tw-btn-new:hover { opacity: .88; }
    .tw-btn-icon {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--tw-slate);
      cursor: pointer;
      border: 1px solid var(--tw-border);
      background: white;
      font-family: 'DM Sans', sans-serif;
      transition: all .15s;
      white-space: nowrap;
    }
    .tw-btn-icon:hover { background: var(--tw-teal-light); color: var(--tw-teal); border-color: var(--tw-teal); }
    .tw-user-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 3px 10px 3px 3px;
      background: var(--tw-teal-light);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: var(--tw-teal);
      white-space: nowrap;
    }
    .tw-avatar {
      width: 26px; height: 26px;
      background: var(--tw-teal);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: white;
      font-weight: 700;
      flex-shrink: 0;
    }
    .tw-search-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: white;
      border: 1px solid var(--tw-border);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,125,137,.12);
      z-index: 9999;
      max-height: 380px;
      overflow-y: auto;
    }
    .tw-search-item {
      padding: 10px 14px;
      border-bottom: 1px solid #f5f5f5;
      cursor: pointer;
      transition: background .12s;
    }
    .tw-search-item:last-child { border-bottom: none; }
    .tw-search-item:hover { background: var(--tw-teal-light); }
    /* ── DASHBOARD PROTOTYPE ── */
    .tw-content { flex: 1; padding: 22px; overflow-y: auto; }
    .tw-section-title {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; color: var(--tw-muted); margin-bottom: 12px;
    }
    .tw-kpi-strip { display: grid; grid-template-columns: repeat(5,1fr); gap: 12px; margin-bottom: 24px; }
    .tw-kpi-card {
      background: white; border: 1px solid var(--tw-border);
      border-radius: 10px; padding: 16px 20px;
      box-shadow: 0 1px 3px rgba(0,125,137,.06);
    }
    .tw-kpi-label { font-size: 11px; color: var(--tw-muted); font-weight: 500; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .tw-kpi-value { font-size: 26px; font-weight: 600; font-family: 'DM Sans', sans-serif; font-variant-numeric: tabular-nums; color: var(--tw-ink); line-height: 1; }
    .tw-kpi-sub { font-size: 12px; color: var(--tw-slate); margin-top: 5px; }
    .tw-kpi-sub b { color: var(--tw-ink); }
    .tw-kpi-duo { display: flex; gap: 16px; margin-top: 10px; }
    .tw-kpi-duo-sep { width: 1px; background: var(--tw-border); align-self: stretch; flex-shrink: 0; }
    .tw-duo-lbl { font-size: 10px; color: var(--tw-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
    .tw-duo-val { font-size: 18px; font-weight: 600; font-family: 'DM Sans', sans-serif; font-variant-numeric: tabular-nums; }
    .tw-duo-sub { font-size: 11px; color: var(--tw-muted); margin-top: 2px; }
    /* Tab commerciaux */
    .tw-tab-wrap { background: white; border: 1px solid var(--tw-border); border-radius: 10px; box-shadow: 0 1px 3px rgba(0,125,137,.06); margin-bottom: 24px; overflow: hidden; }
    .tw-tabs { display: flex; border-bottom: 1px solid var(--tw-border); background: var(--tw-bg); overflow-x: auto; }
    .tw-tab {
      padding: 11px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      border: none; background: transparent; color: var(--tw-slate); cursor: pointer;
      border-bottom: 3px solid transparent; transition: all .15s; white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
    }
    .tw-tab:hover { color: var(--tw-teal); background: var(--tw-teal-light); }
    .tw-tab.tw-tab-active { color: var(--tw-teal); border-bottom-color: var(--tw-teal); background: white; font-weight: 600; }
    .tw-tab-badge { display: inline-flex; align-items: center; justify-content: center; width: 17px; height: 17px; background: var(--tw-red); color: white; border-radius: 50%; font-size: 10px; font-weight: 700; }
    .tw-tab-body { padding: 18px 22px; }
    /* Stat rows dans tab */
    .tw-cs-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; margin-bottom: 14px; }
    .tw-cs-item { background: var(--tw-bg); border-radius: 6px; padding: 10px; text-align: center; cursor: pointer; transition: background .15s; }
    .tw-cs-item:hover { background: var(--tw-teal-light); }
    .tw-cs-val { font-size: 20px; font-weight: 700; font-family: 'DM Sans', sans-serif; font-variant-numeric: tabular-nums; }
    .tw-cs-lbl { font-size: 10px; color: var(--tw-muted); text-transform: uppercase; letter-spacing: .4px; margin-top: 3px; }
    .tw-row-line { display: flex; gap: 10px; margin-bottom: 8px; }
    .tw-row-box { flex: 1; background: var(--tw-bg); border-radius: 6px; padding: 9px 13px; display: flex; align-items: center; justify-content: space-between; }
    .tw-row-lbl { font-size: 12px; color: var(--tw-slate); }
    .tw-chips { display: flex; gap: 5px; flex-wrap: wrap; }
    .tw-chip { font-size: 11px; padding: 2px 8px; border-radius: 8px; background: #f0f0f0; font-weight: 600; }
    .tw-pill-green { background: #e8f8f0; color: var(--tw-green); font-size: 12px; padding: 2px 9px; border-radius: 10px; font-weight: 500; }
    .tw-pill-red   { background: #fdecea; color: var(--tw-red);   font-size: 12px; padding: 2px 9px; border-radius: 10px; font-weight: 500; }
    /* 2 col stats */
    .tw-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px; }
    .tw-card { background: white; border: 1px solid var(--tw-border); border-radius: 10px; padding: 18px; box-shadow: 0 1px 3px rgba(0,125,137,.06); }
    .tw-card-title { font-size: 13px; font-weight: 600; color: var(--tw-ink); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--tw-border); }
    .tw-prob-row { margin-bottom: 10px; }
    .tw-prob-hdr { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; }
    .tw-prob-bar-bg { height: 6px; background: #f0f0f0; border-radius: 3px; overflow: hidden; }
    .tw-prob-bar-fill { height: 100%; border-radius: 3px; }
    .tw-age-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f5f5f5; font-size: 12px; }
    .tw-age-row:last-child { border-bottom: none; }
    .tw-age-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .tw-age-val { font-family: 'DM Sans', sans-serif; font-variant-numeric: tabular-nums; font-weight: 700; font-size: 15px; }
    /* Base stats card */
    .tw-stat-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #f8f8f8; font-size: 13px; }
    .tw-stat-row:last-child { border-bottom: none; }
    .tw-stat-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 7px; flex-shrink: 0; }
    .tw-stat-val { font-weight: 700; font-family: 'DM Sans', sans-serif; font-variant-numeric: tabular-nums; font-size: 15px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    // ================== APP PRINCIPALE ==================
    console.log('[Pipeline] Version chargée: ' + new Date().toISOString());
    const API_URL = 'https://pipeline-app-702707858708.europe-west9.run.app/api';

    // ================== UTILITAIRES (définis avant App) ==================
    
    function getActionStatus(actions) {
      if (!actions || actions.length === 0) return { hasAction: false, isLate: false, nextActionDate: null };
      
      const incompletedActions = actions.filter(a => !a.completed);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      
      let isLate = false;
      let nextActionDate = null;
      
      // Trouver la prochaine action non complétée (la plus proche dans le futur ou la plus récente si en retard)
      if (incompletedActions.length > 0) {
        const sortedActions = incompletedActions.sort((a, b) => {
          const dateA = new Date(a.planned_date);
          const dateB = new Date(b.planned_date);
          return dateA - dateB;
        });
        nextActionDate = sortedActions[0].planned_date;
        
        const actionDate = new Date(nextActionDate);
        actionDate.setHours(0, 0, 0, 0);
        if (actionDate < today) isLate = true;
      }
      
      return { hasAction: incompletedActions.length > 0, isLate, nextActionDate };
    }

    function prospectDisplayName(p) {
      if (!p) return '';
      if (p.nom_commercial && p.nom_commercial.trim()) return p.name + ' (' + p.nom_commercial.trim() + ')';
      return p.name;
    }

    function getEmptyProspect() {
      return {
        id: null,
        name: '',
        nom_commercial: '',
        marques: [],
        contact_name: '',
        email: '',
        phone: '',
        adresse: '',
        website: '',
        tel_standard: '',
        statut_societe: '',
        status: 'Prospection',
        status_date: '',
        setup_amount: 0,
        monthly_amount: 0,
        annual_amount: 0,
        training_amount: 0,
        material_amount: 0,
        chance_percent: 20,
        assigned_to: '',
        quote_date: '',
        decision_maker: '',
        solutions_en_place: '',
        notes: '',
        siren: '',
        code_naf: '',
        nom_commercial: '',
        marques: [],
        pdf_url: null,
        // Modules
        module_biz: 0,
        module_biz_avec_fab: 0,
        module_fab: 0,
        module_net: 0,
        module_kub: 0,
        module_mag: 0,
        module_vrp: 0,
        module_col: 0,
        module_log: 0,
        module_jet: 0,
        module_flux_tiers: 0,
        module_compta_sage: false,
        module_facturation_electronique: false
      };
    }

    function calculateTotal(prospect) {
      const monthlyAnnual = prospect.monthly_amount * 12;
      return (prospect.setup_amount || 0) + monthlyAnnual + (prospect.annual_amount || 0) + (prospect.training_amount || 0);
    }

    function formatCurrency(amount) {
      return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(amount);
    }

    function formatNumber(num) {
      return new Intl.NumberFormat('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(Number(num) || 0) + ' € H.T.';
    }

    function getStatusColor(status) {
      const colors = {
        'Prospection': '#999',
        'Devis': '#12a0dc',
        'Démo': '#e72c7b',
        'Négociation': '#d3a002',
        'Signé': '#3cd6b9',
        'Ajourné N+1': '#ff9800',
        'Éliminé par nous': '#888',
        'Perdu': '#e23b63'
      };
      return colors[status] || '#666';
    }

    function getProspectCountByCommercial(prospects, commercial) {
      if (commercial === 'Tous') {
        return prospects.length;
      }
      return prospects.filter(p => p.assigned_to === commercial).length;
    }

    // Calculer le statut réel à partir des affaires et devis
    function getProspectRealStatus(affaires, devisList) {
      if (!affaires || affaires.length === 0) {
        return null; // Pas d'affaire = pas de statut affiché
      }

      // Chercher toutes les affaires avec devis actifs (pas affaire Gagnée/Perdue)
      const affairesAvecDevis = [];
      
      for (const affaire of affaires) {
        if (affaire.statut_global === 'Gagné' || affaire.statut_global === 'Perdu') {
          continue; // Ignorer affaires terminées
        }
        
        // Prendre TOUS les devis de l'affaire en cours (même ceux à 100%)
        const devisAffaire = devisList.filter(d => d.affaire_id === affaire.id);
        
        if (devisAffaire.length > 0) {
          // Prendre le devis le plus récent
          const dernierDevis = devisAffaire.sort((a, b) => new Date(b.quote_date || 0) - new Date(a.quote_date || 0))[0];
          affairesAvecDevis.push({
            affaire: affaire,
            devis: dernierDevis
          });
        }
      }

      if (affairesAvecDevis.length === 0) {
        return null; // Pas de devis actif
      }

      // Si plusieurs affaires, prendre la plus récente
      affairesAvecDevis.sort((a, b) => new Date(b.devis.quote_date || 0) - new Date(a.devis.quote_date || 0));
      const affairePlusRecente = affairesAvecDevis[0];

      return {
        affaireName: affairePlusRecente.affaire.nom_affaire,
        devisStatus: affairePlusRecente.devis.devis_status,
        probability: affairePlusRecente.devis.chance_percent,
        quoteDate: affairePlusRecente.devis.quote_date
      };
    }

    function App() {
      const [user, setUser] = React.useState(null);
      const [isDashboard, setIsDashboard] = React.useState(true);
      const [showAttribution, setShowAttribution] = React.useState(false);
      const isUserAdmin = (u) => u && ['Christian', 'Frédéric', 'Frederic'].includes(u.name);
      const [selectedCommercial, setSelectedCommercial] = React.useState(null);
      const [showSettings, setShowSettings] = React.useState(false);
      const [showRecap, setShowRecap] = React.useState(false);
      const [recapCommercial, setRecapCommercial] = React.useState(null);
      const [recapPeriod, setRecapPeriod] = React.useState('jour'); // 'jour', 'semaine', 'mois'
      const [recapDate, setRecapDate] = React.useState(new Date().toISOString().split('T')[0]);
      const [prospects, setProspects] = React.useState([]);
      const [codesNaf, setCodesNaf] = React.useState([]);
      const [appUsers, setAppUsers] = React.useState([]);
      const [activities, setActivities] = React.useState({});
      const [nextActions, setNextActions] = React.useState([]);
      const [allActions, setAllActions] = React.useState([]);
      const [statusHistory, setStatusHistory] = React.useState([]);
      const [actionNotes, setActionNotes] = React.useState({});
      const [prospectActionsInfo, setProspectActionsInfo] = React.useState({});
      const [newActionType, setNewActionType] = React.useState('Appel');
      const [newActionDate, setNewActionDate] = React.useState(new Date().toISOString().split('T')[0]);
      const [newActionComment, setNewActionComment] = React.useState('');
      const [newActionActor, setNewActionActor] = React.useState('');
      const [newActionContact, setNewActionContact] = React.useState('');
      const [tempActionComments, setTempActionComments] = React.useState({});
      const [selectedProspect, setSelectedProspect] = React.useState(null);
      const [showForm, setShowForm] = React.useState(false);
      const [formData, setFormData] = React.useState(getEmptyProspect());
      const [interlocuteurs, setInterlocuteurs] = React.useState([]);
      const [showInterlocuteurForm, setShowInterlocuteurForm] = React.useState(false);
      
      // STATE MODAL COMPTEURS (au niveau App pour éviter problèmes de rendu)
      const [showCompteurModal, setShowCompteurModal] = React.useState(false);
      const [compteurModalData, setCompteurModalData] = React.useState({ title: '', prospects: [] });
      
      const [interlocuteurForm, setInterlocuteurForm] = React.useState({
        id: null,
        nom: '',
        fonction: '',
        email: '',
        telephone: '',
        principal: false,
        decideur: false
      });
      // États pour les devis
      const [devisList, setDevisList] = React.useState([]);
      const [showDevisForm, setShowDevisForm] = React.useState(false);
      const [editingDevisId, setEditingDevisId] = React.useState(null);
      const [editingDevis, setEditingDevis] = React.useState(null); // Devis complet en édition (avec pdf_url)
      const [devisFormData, setDevisFormData] = React.useState({
        devis_name: '',
        devis_status: 'En cours',
        quote_date: '',
        setup_amount: 0,
        monthly_amount: 0,
        annual_amount: 0,
        training_amount: 0,
        chance_percent: 0,
        modules: {},
        comment: ''
      });
      const [devisPdfFile, setDevisPdfFile] = React.useState(null);
      const [isUploadingDevisPdf, setIsUploadingDevisPdf] = React.useState(false);
      
      // States Affaires
      const [affairesList, setAffairesList] = React.useState([]);
      const [affairesActions, setAffairesActions] = React.useState({}); // {affaire_id: [actions]}
      const [showAffaireForm, setShowAffaireForm] = React.useState(false);
      const [showActionAffaireForm, setShowActionAffaireForm] = React.useState(false);
      const [selectedAffaireForAction, setSelectedAffaireForAction] = React.useState(null);
      const [actionAffaireFormData, setActionAffaireFormData] = React.useState({
        action_type: 'Appel',
        action_date: new Date().toISOString().split('T')[0],
        action_actor: '',
        action_contact: '',
        action_comment: ''
      });
      const [editingAffaireId, setEditingAffaireId] = React.useState(null);
      const [affaireFormData, setAffaireFormData] = React.useState({
        nom_affaire: '',
        description: '',
        statut_global: 'En cours'
      });
      const [selectedAffaireId, setSelectedAffaireId] = React.useState(null);
      const [expandedActionId, setExpandedActionId] = React.useState(null);
      
      const [filterSocietyType, setFilterSocietyType] = React.useState('Tous');
      const [filterStatus, setFilterStatus] = React.useState('Tous');
      const [filterCommercial, setFilterCommercial] = React.useState('Tous');
      const [filterAttribution, setFilterAttribution] = React.useState('NonAttribuees');
      const [searchTerm, setSearchTerm] = React.useState('');
      const [sortBy, setSortBy] = React.useState('name');

      // 🔥 AJOUT : Charger le token depuis localStorage au démarrage
      React.useEffect(() => {
        const storedUser = localStorage.getItem('user');
        if (storedUser) {
          try {
            const userData = JSON.parse(storedUser);
            setUser(userData);
          } catch (err) {
            console.error('Erreur parse user:', err);
            localStorage.removeItem('user');
          }
        }
      }, []);

      React.useEffect(() => {
        if (user) {
          fetchProspects();
          fetch(`${API_URL}/users`, { headers: { 'Authorization': `Bearer ${user.token}` } })
            .then(r => r.json()).then(data => { if (Array.isArray(data)) setAppUsers(data); });
          fetch(`${API_URL}/codes-naf`, { headers: { 'Authorization': `Bearer ${user.token}` } })
            .then(r => r.json()).then(data => { if (Array.isArray(data)) setCodesNaf(data); });
        }
      }, [user]);

      // Charger les actions de tous les prospects après le chargement
      React.useEffect(() => {
        if (prospects.length > 0 && user) {
          prospects.forEach(prospect => {
            fetchNextActions(prospect.id);
          });
        }
      }, [prospects.length, user]);

      const fetchProspects = async () => {
        try {

          const method = formData.id ? 'PUT' : 'POST';
          const url = formData.id 
            ? `${API_URL}/prospects/${formData.id}`
            : `${API_URL}/prospects`;

          const res = await fetch(url, {
            method,
            headers: { 
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${user.token}`
            },
            body: JSON.stringify(formData)
          });

          if (res.ok) {
            const data = await res.json();
            
            // Sauvegarder les modules si le statut est Devis/Démo/Négociation/Signé
            const prospectId = data.id || formData.id;
            if (['Devis', 'Démo', 'Négociation', 'Signé'].includes(formData.status)) {
              await saveModules(prospectId, formData);
            }
            
            await fetchProspects();
            
            // Si c'est une création (pas d'ID avant), demander si on veut ajouter des interlocuteurs
            if (!formData.id && data.id) {
              const addInterlocuteurs = window.confirm('Entreprise créée avec succès ! Voulez-vous ajouter des interlocuteurs ?');
              if (addInterlocuteurs) {
                // Charger le prospect créé et ouvrir la page Information Société
                const createdProspect = { ...formData, id: data.id };
                setSelectedProspect(createdProspect);
                setFormData(createdProspect);
                await fetchInterlocuteurs(data.id);
                setShowForm(true);
                return;
              }
            }
            
            // Mettre à jour selectedProspect et recharger les données
            if (formData.id) {
              setSelectedProspect(formData);
              await fetchStatusHistory(formData.id);
              await fetchNextActions(formData.id);
            }
            setShowForm(false);
            setFormData(getEmptyProspect());
          }
        } catch (err) {
          alert('Erreur: ' + err.message);
        }
      };

      const handleDeleteProspect = async (id) => {
        if (window.confirm('Supprimer ce prospect ?')) {
          try {
            const res = await fetch(`${API_URL}/prospects/${id}`, {
              method: 'DELETE',
              headers: { 'Authorization': `Bearer ${user.token}` }
            });
            if (res.ok) {
              fetchProspects();
              setSelectedProspect(null);
            }
          } catch (err) {
            alert('Erreur: ' + err.message);
          }
        }
      };

      const handleAddActivity = async (prospectId, activityType, description) => {
        try {
          const res = await fetch(`${API_URL}/prospects/${prospectId}/activities`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${user.token}`
            },
            body: JSON.stringify({ activity_type: activityType, description })
          });
          if (res.ok) {
            fetchActivities(prospectId);
          }
        } catch (err) {
          alert('Erreur: ' + err.message);
        }
      };

      const handleAddNextAction = async () => {
        if (!selectedProspect) return;
        try {
          const res = await fetch(`${API_URL}/prospects/${selectedProspect.id}/next_actions`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${user.token}`
            },
            body: JSON.stringify({ 
              action_type: newActionType, 
              planned_date: newActionDate, 
              actor: newActionActor,
              contact: newActionContact,
              completed_note: newActionComment 
            })
          });
          if (res.ok) {
            fetchNextActions(selectedProspect.id);
            fetchAllActions(selectedProspect.id);
            setNewActionType('Appel');
            setNewActionDate(new Date().toISOString().split('T')[0]);
            setNewActionActor('');
            setNewActionContact('');
            setNewActionComment('');
          }
        } catch (err) {
          alert('Erreur: ' + err.message);
        }
      };

      const handleToggleNextAction = async (actionId, completed, notes = '') => {
        try {
          const res = await fetch(`${API_URL}/next_actions/${actionId}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${user.token}`
            },
            body: JSON.stringify({ completed: !completed, completed_notes: notes })

          if (res.ok) {
            fetchNextActions(selectedProspect.id);
            fetchAllActions(selectedProspect.id);
            setActionNotes({...actionNotes, [actionId]: ''});

          alert('Erreur: ' + err.message);

      const handleDeleteNextAction = async (actionId) => {

            const res = await fetch(`${API_URL}/next_actions/${actionId}`, {

              headers: { 'Authorization': `Bearer ${user.token}` }

              fetchNextActions(selectedProspect.id);

      };

      const formatDateForInput = (dateStr) => {
        if (!dateStr) return '';
        // Si format ISO (avec T), convertir en yyyy-MM-dd
        if (dateStr.includes('T')) {
          return dateStr.split('T')[0];
        }
        return dateStr;

      const handleEditProspect = async (prospect) => {
        const formattedProspect = {

      const handleNewProspect = () => {

      const handleSelectProspect = (prospect) => {
        console.log('Clicking on prospect:', prospect.id, prospect.name);

      // Si non-admin, restreindre aux prospects du user connecté
      let visibleProspects = isUserAdmin(user) ? prospects : prospects.filter(p => p.assigned_to === user.name);
      // Filtre attribution (admin uniquement)

        // 'Toutes' = pas de filtre supplémentaire
      }

      const filteredProspects = visibleProspects.filter(p => {
        // Filtre par type de société (Suspect/Prospect/Client)
        let matchSocietyType;
        if (filterSocietyType === 'Tous') {
          matchSocietyType = true;
        } else {
          matchSocietyType = p.statut_societe === filterSocietyType;
        }
        
        // Filtre par statut
        let matchStatus;
        if (filterStatus === 'Tous') {
          matchStatus = true;
        } else if (filterStatus === 'Devis') {
          // "Devis" = tous ceux qui ont un statut de devis actif (En cours, Envoyé, Discussion)
          matchStatus = p.real_status && ['En cours', 'Envoyé', 'Discussion'].includes(p.real_status);
        } else if (filterStatus === 'Prospection') {
          // "Prospection" = ceux qui n'ont pas de devis actif
          matchStatus = !p.real_status;
        } else if (filterStatus === 'Signé') {
          // "Signé" = Gagné
          matchStatus = p.real_status === 'Gagné';
        } else if (filterStatus === 'Perdu') {
          // "Perdu" = Perdu
          matchStatus = p.real_status === 'Perdu';
        } else {
          // Autres statuts : mapper directement
          matchStatus = p.real_status === filterStatus;
        }
        
        const matchCommercial = (filterAttribution === 'Mes' || filterAttribution === 'NonAttribuees')
          ? true
          : (filterCommercial === 'Tous' || p.assigned_to === filterCommercial || (!p.assigned_to && filterCommercial === 'Tous'));
        const matchSearch = p.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                           (p.contact_name && p.contact_name.toLowerCase().includes(searchTerm.toLowerCase())) ||
                           (p.email && p.email.toLowerCase().includes(searchTerm.toLowerCase()));
        return matchSocietyType && matchStatus && matchCommercial && matchSearch;
      }).sort((a, b) => {
        if (sortBy === 'name') {
          return a.name.localeCompare(b.name);
        } else if (sortBy === 'ancienneté') {
          // Utiliser real_quote_date (calculé depuis affaires/devis)
          const getRelevantDate = (prospect) => {
            return prospect.real_quote_date || prospect.created_at;
          };
          
          const dateStrA = getRelevantDate(a);
          const dateStrB = getRelevantDate(b);
          
          // Si pas de date, mettre à la fin
          if (!dateStrA && !dateStrB) return 0;
          if (!dateStrA) return 1;
          if (!dateStrB) return -1;
          
          // Parser les dates correctement
          const dateA = new Date(dateStrA.includes('-') ? dateStrA : dateStrA.split('/').reverse().join('-')).getTime();
          const dateB = new Date(dateStrB.includes('-') ? dateStrB : dateStrB.split('/').reverse().join('-')).getTime();
          return dateA - dateB;  // Plus ancien d'abord
        } else if (sortBy === 'probabilité') {
          // Trier par real_probability (calculé depuis affaires/devis)
          return (b.real_probability || 0) - (a.real_probability || 0);
        }
        return 0;
      });

      if (!user) {

      }

                setShowForm(true);

            <RightPanel

              onUpdateProspect={(updated) => {
                setSelectedProspect(updated);

                // Recharger les prospects enrichis pour sync complète

    // ================== RECAP MODAL ==================
    function RecapModal({ commercial, period, prospects, onClose, onNavigate, user, API_URL }) {
      const [recapData, setRecapData] = React.useState(null);
      const [loading, setLoading] = React.useState(true);

      React.useEffect(() => {
        const fetchRecap = async () => {
          try {
            const today = new Date();
            today.setHours(23, 59, 59, 999);
            
            // Calculer les dates de début et fin selon la période
            let startDate, endDate;
            
            if (period === 'jour') {
              startDate = new Date();
              startDate.setHours(0, 0, 0, 0);
              endDate = new Date();
              endDate.setHours(23, 59, 59, 999);
            } else if (period === 'semaine') {
              startDate = new Date();
              const day = startDate.getDay();
              const diff = startDate.getDate() - day + (day === 0 ? -6 : 1); // Lundi
              startDate.setDate(diff);
              startDate.setHours(0, 0, 0, 0);
              
              // endDate = dimanche de cette semaine
              endDate = new Date(startDate);
              endDate.setDate(startDate.getDate() + 6); // +6 jours = dimanche
              endDate.setHours(23, 59, 59, 999);
            } else { // mois
              startDate = new Date(today.getFullYear(), today.getMonth(), 1);
              startDate.setHours(0, 0, 0, 0);
              // endDate = dernier jour du mois
              endDate = new Date(today.getFullYear(), today.getMonth() + 1, 0);
              endDate.setHours(23, 59, 59, 999);
            }

            // Prospects créés dans la période
            const prospectsCreated = prospects.filter(p => {
              if (p.assigned_to !== commercial) return false;
              const createdDate = new Date(p.created_at);
              return createdDate >= startDate && createdDate <= endDate;
            });

            const suspects = prospectsCreated.filter(p => p.statut_societe === 'Suspect').length;
            const prospectsCount = prospectsCreated.filter(p => p.statut_societe === 'Prospect').length;
            const clients = prospectsCreated.filter(p => p.statut_societe === 'Client').length;

            // Devis créés dans la période
            const devisCreated = prospects.filter(p => {
              if (p.assigned_to !== commercial) return false;
              if (!p.real_status || !['En cours', 'Envoyé', 'Discussion'].includes(p.real_status)) return false;
              if (!p.status_date) return false;
              const statusDate = new Date(p.status_date);
              return statusDate >= startDate && statusDate <= endDate;
            });

            // Charger toutes les actions du commercial (en parallèle pour optimiser)
            const commercialProspects = prospects.filter(p => p.assigned_to === commercial);
            const actionsPromises = commercialProspects.map(async (prospect) => {
              try {
                const res = await fetch(`${API_URL}/prospects/${prospect.id}/next_actions`, {
                  headers: { 'Authorization': `Bearer ${user.token}` }
                });
                if (res.ok) {
                  const actions = await res.json();
                  return actions.map(action => ({
                    ...action,
                    prospect_id: prospect.id,
                    prospect_name: prospect.name
                  }));
                }
              } catch (err) {
                console.error('Erreur chargement actions:', err);
              }
              return [];
            });

            const actionsArrays = await Promise.all(actionsPromises);
            const allActions = actionsArrays.flat();

            // Actions créées dans la période ET prévues dans la période (non cochées uniquement)
            const actionsCreated = allActions.filter(a => {
              if (a.completed) return false;
              const createdDate = new Date(a.created_at);
              const plannedDate = new Date(a.planned_date);
              // L'action doit être créée dans la période ET prévue dans la période
              return (createdDate >= startDate && createdDate <= endDate) &&
                     (plannedDate >= startDate && plannedDate <= endDate);
            });

            // Actions planifiées dans la période (non encore réalisées)
            const actionsPlanned = allActions.filter(a => {
              if (a.completed) return false;
              const actionDate = new Date(a.planned_date);
              return actionDate >= startDate && actionDate <= endDate;
            });

            // Actions en retard (non cochées et date < aujourd'hui)
            // Actions en retard = date strictement AVANT aujourd'hui (pas aujourd'hui)
            const startOfToday = new Date();
            startOfToday.setHours(0, 0, 0, 0);
            const actionsLate = allActions.filter(a => {
              if (a.completed) return false;
              const actionDate = new Date(a.planned_date);
              return actionDate < startOfToday;
            });

            setRecapData({
              period,
              periodLabel: period === 'jour' ? 'du jour' : period === 'semaine' ? 'de la semaine' : 'du mois',
              startDate,
              endDate,
              prospectsCreated,
              suspects,
              prospectsCount,
              clients,
              devisCreated,
              actionsCreated,
              actionsPlanned,
              actionsLate
            });
          } catch (err) {
            console.error('Erreur récap:', err);
          }
          setLoading(false);
        };

        fetchRecap();
      }, [commercial, period, prospects]);

          <div style={{

    function Header({ user, onLogout, onDashboard, isDashboard, onSettings, onAttribution, showAttribution, prospects, onSelectProspect, onNewProspect }) {
      const [globalSearch, setGlobalSearch] = React.useState('');
      const [showResults, setShowResults] = React.useState(false);
      const [searchIndex, setSearchIndex] = React.useState(-1);
      const searchRef = React.useRef(null);

      React.useEffect(() => {
        const handleClickOutside = (e) => {
          if (searchRef.current && !searchRef.current.contains(e.target)) setShowResults(false);
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const filteredProspects = globalSearch.length >= 2 && prospects
        ? prospects.filter(p =>
            p.name.toLowerCase().includes(globalSearch.toLowerCase()) ||
            (p.contact_name && p.contact_name.toLowerCase().includes(globalSearch.toLowerCase()))
          ).slice(0, 10)
        : [];

      const initials = (name) => name ? name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2) : '?';
      const isAdmin = ['Christian', 'Frédéric', 'Frederic'].includes(user.name);

      return (
        <div className="tw-topbar">
          {/* LOGO */}
          <div className="tw-logo">
            <img src="texaswin-logo.png" alt="TexasWin" onError={(e) => { e.target.style.display='none'; }} />
            TexasWin
          </div>

          {/* SEARCH */}
          <div className="tw-search-box" ref={searchRef}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--tw-muted)" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input
              type="text"
              placeholder="Rechercher une société..."
              value={globalSearch}
              onChange={(e) => { setGlobalSearch(e.target.value); setShowResults(e.target.value.length >= 2); setSearchIndex(-1); }}
              onFocus={() => globalSearch.length >= 2 && setShowResults(true)}
              onKeyDown={(e) => {
                if (!showResults || filteredProspects.length === 0) return;
                if (e.key === 'ArrowDown') { e.preventDefault(); setSearchIndex(i => Math.min(i+1, filteredProspects.length-1)); }
                else if (e.key === 'ArrowUp') { e.preventDefault(); setSearchIndex(i => Math.max(i-1, 0)); }
                else if (e.key === 'Enter' && searchIndex >= 0) {
                  const p = filteredProspects[searchIndex];
                  onSelectProspect(p); setGlobalSearch(''); setShowResults(false); setSearchIndex(-1);
                  if (isDashboard) onDashboard();
                } else if (e.key === 'Escape') { setShowResults(false); setSearchIndex(-1); }
              }}
            />
            {showResults && (
              <div className="tw-search-dropdown">
                {filteredProspects.length > 0 ? filteredProspects.map((p, idx) => (
                  <div key={p.id} className="tw-search-item"
                    style={{background: idx === searchIndex ? 'var(--tw-teal-light)' : 'white'}}
                    onClick={() => {
                    onSelectProspect(p); setGlobalSearch(''); setShowResults(false); setSearchIndex(-1);
                    if (isDashboard) onDashboard();
                  }}>
                    <div style={{fontWeight: '600', fontSize: '13px', color: 'var(--tw-ink)'}}>{prospectDisplayName(p)}</div>
                    <div style={{fontSize: '11px', color: 'var(--tw-muted)', marginTop: '2px'}}>
                      {p.contact_name && `${p.contact_name} · `}
                      <span style={{color: p.statut_societe === 'Client' ? 'var(--tw-teal)' : p.statut_societe === 'Prospect' ? 'var(--tw-orange)' : 'var(--tw-muted)'}}>{p.statut_societe || 'Prospect'}</span>
                      {p.real_status && <span style={{color: 'var(--tw-slate)'}}> · {p.real_status}</span>}
                    </div>
                  </div>
                )) : (
                  <div style={{padding: '16px', textAlign: 'center', color: 'var(--tw-muted)', fontSize: '13px'}}>Aucune société trouvée</div>
                )}
              </div>
            )}
          </div>

          {/* BTN NOUVELLE SOCIÉTÉ */}
          <button className="tw-btn-new" onClick={onNewProspect}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 5v14M5 12h14"/></svg>
            Nlle Société
          </button>

          {/* SPACER */}
          <div style={{flex: 1}} />

          {/* NAV DROITE */}
          <nav className="tw-nav">
            <button className={`tw-nav-btn ${isDashboard && !showAttribution ? 'tw-active' : ''}`} onClick={() => { if (!isDashboard) onDashboard(); if (showAttribution) onDashboard(); }}>Dashboard</button>
            <button className={`tw-nav-btn ${!isDashboard && !showAttribution ? 'tw-active' : ''}`} onClick={() => { if (isDashboard) onDashboard(); if (showAttribution) onDashboard(); }}>Suivi activités</button>
            {user.name === 'Christian' && (
              <button className={`tw-nav-btn ${showAttribution ? 'tw-active' : ''}`} onClick={onAttribution}>🎯 Attribution Sté</button>
            )}
          </nav>

          {/* PARAMÈTRES */}
          {isAdmin && (
            <button className="tw-btn-icon" onClick={onSettings}>⚙ Paramètres</button>
          )}

          {/* USER + DÉCONNEXION */}
          <div className="tw-user-chip">
            <div className="tw-avatar">{initials(user.name)}</div>
            {user.name}
          </div>
          <button className="tw-btn-icon" onClick={onLogout} style={{color: 'var(--tw-red)', borderColor: '#fcc'}}>Déconnexion</button>
        </div>
      );
    }

    function AttributionView({ prospects, users, user, API_URL, onClose, onUpdateProspect }) {
      const nonAttribues = prospects.filter(p => !p.assigned_to || p.assigned_to === '');
      const commerciaux = (users||[]).filter(u => !['Frédéric','Frederic'].includes(u.name));

      // State : map id -> commercial sélectionné
      const [selections, setSelections] = React.useState(() => {
        const m = {};
        nonAttribues.forEach(p => { m[p.id] = ''; });
        return m;
      });
      const [sending, setSending] = React.useState(false);
      const [result, setResult] = React.useState(null);

      const handleSelectAll = (commercialName) => {
        const m = {};
        nonAttribues.forEach(p => { m[p.id] = commercialName; });
        setSelections(m);
      };

      const handleSend = async () => {
        const toSend = nonAttribues.filter(p => selections[p.id]);
        if (toSend.length === 0) return;
        setSending(true);
        setResult(null);
        try {
          const attributions = toSend.map(p => ({ id: p.id, commercial_name: selections[p.id] }));
          const res = await fetch(`${API_URL}/attributions/bulk`, {
            method: 'PUT',
            headers: {'Content-Type':'application/json','Authorization':`Bearer ${user.token}`},
            body: JSON.stringify({ attributions })
          });
          if (!res.ok) throw new Error('Erreur serveur');
          toSend.forEach(p => onUpdateProspect({...p, assigned_to: selections[p.id]}));
          setResult({ ok: toSend.length, errors: [] });
        } catch(e) {
          setResult({ ok: 0, errors: toSend.map(p => p.name) });
        }
        setSending(false);
      };

      const nbSelectionnes = nonAttribues.filter(p => selections[p.id]).length;

      return (
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.45)',zIndex:500,display:'flex',alignItems:'flex-start',justifyContent:'center',paddingTop:'60px'}}>
          <div style={{background:'white',borderRadius:'12px',width:'860px',maxWidth:'95vw',maxHeight:'85vh',display:'flex',flexDirection:'column',boxShadow:'0 8px 40px rgba(0,0,0,.18)',overflow:'hidden'}}>

            {/* Header */}
            <div style={{padding:'20px 24px',borderBottom:'1px solid var(--tw-border)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
              <div>
                <div style={{fontSize:'17px',fontWeight:'700',color:'var(--tw-ink)'}}>🎯 Attribution des sociétés</div>
                <div style={{fontSize:'13px',color:'var(--tw-muted)',marginTop:'3px'}}>{nonAttribues.length} société{nonAttribues.length>1?'s':''} non attribuée{nonAttribues.length>1?'s':''}</div>
              </div>
              <button onClick={onClose} style={{background:'none',border:'none',fontSize:'20px',cursor:'pointer',color:'var(--tw-muted)',lineHeight:1}}>✕</button>
            </div>

            {/* Attribution en masse */}
            {nonAttribues.length > 0 && (
              <div style={{padding:'12px 24px',borderBottom:'1px solid var(--tw-border)',background:'var(--tw-bg)',display:'flex',alignItems:'center',gap:'10px',flexShrink:0,flexWrap:'wrap'}}>
                <span style={{fontSize:'12px',color:'var(--tw-muted)',fontWeight:'600',textTransform:'uppercase',letterSpacing:'.4px'}}>Attribuer tout à :</span>
                {commerciaux.map(c => (
                  <button key={c.id} onClick={() => handleSelectAll(c.name)}
                    style={{padding:'5px 14px',background:'var(--tw-teal-light)',color:'var(--tw-teal)',border:'1px solid var(--tw-border)',borderRadius:'20px',fontSize:'12px',fontWeight:'600',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>
                    {c.name}
                  </button>

    function Settings({ onClose, user }) {
      const [users, setUsers] = React.useState([]);
      const [newUserEmail, setNewUserEmail] = React.useState('');
      const [newUserPassword, setNewUserPassword] = React.useState('');
      const [newUserName, setNewUserName] = React.useState('');
      const [editingUserId, setEditingUserId] = React.useState(null);
      const [newPassword, setNewPassword] = React.useState('');
      const [showNewPassword, setShowNewPassword] = React.useState(false);
      const [showPassword, setShowPassword] = React.useState({});
      const [showTempPassword, setShowTempPassword] = React.useState({});

      React.useEffect(() => {
        fetchUsers();
      }, []);

      const fetchUsers = async () => {
        try {
          const res = await fetch(`${API_URL}/users`, {
            headers: { 'Authorization': `Bearer ${user.token}` }
          });
          if (res.ok) {
            const data = await res.json();
            setUsers(data);
          }
        } catch (err) {
          console.error('Erreur:', err);
        }
      };

      const handleCreateUser = async () => {
        if (!newUserEmail || !newUserPassword || !newUserName) {
          alert('Remplissez tous les champs');
          return;
        }
        try {
          const res = await fetch(`${API_URL}/users`, {
            method: 'POST',
            headers: { 
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${user.token}`
            },
            body: JSON.stringify({ email: newUserEmail, password: newUserPassword, name: newUserName })
          });
          if (res.ok) {
            setNewUserEmail('');
            setNewUserPassword('');
            setNewUserName('');
            fetchUsers();
          } else {
            alert('Erreur: ' + (await res.text()));
          }
        } catch (err) {
          alert('Erreur: ' + err.message);
        }
      };

      const handleChangePassword = async (userId) => {
        if (!newPassword) {
          alert('Entrez un nouveau mot de passe');
          return;
        }
        try {
          const res = await fetch(`${API_URL}/users/${userId}/password`, {
            method: 'PUT',
            headers: { 
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${user.token}`
            },
            body: JSON.stringify({ password: newPassword })
          });
          if (res.ok) {
            setEditingUserId(null);
            setNewPassword('');
            fetchUsers();
            alert('Mot de passe modifié');
          } else {
            alert('Erreur: ' + (await res.text()));
          }
        } catch (err) {
          alert('Erreur: ' + err.message);
        }
      };

      const handleDeleteUser = async (userId, userName) => {
        if (window.confirm(`Êtes-vous sûr de vouloir supprimer ${userName} ?`)) {
          try {
            const res = await fetch(`${API_URL}/users/${userId}`, {
              method: 'DELETE',
              headers: { 
                'Authorization': `Bearer ${user.token}`
              }
            });
            if (res.ok) {
              fetchUsers();
              alert('Utilisateur supprimé');
            } else {
              alert('Erreur: ' + (await res.text()));
            }
          } catch (err) {
            alert('Erreur: ' + err.message);
          }
        }
      };

      return (
        <div style={{position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, backgroundColor: 'rgba(0,0,0,0.5)', display: 'flex', justifyContent: 'center', alignItems: 'center', zIndex: 1000}}>
          <div style={{backgroundColor: 'white', borderRadius: '8px', padding: '30px', maxWidth: '600px', width: '90%', maxHeight: '90vh', overflowY: 'auto'}}>
            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px'}}>
              <h2 style={{margin: 0}}>Gestion des comptes</h2>
              <button onClick={onClose} style={{backgroundColor: '#ccc', border: 'none', borderRadius: '4px', padding: '8px 12px', cursor: 'pointer', fontSize: '16px'}}>✕</button>
            </div>

            {/* Créer un nouvel utilisateur */}
            <div style={{backgroundColor: '#f9f9f9', padding: '15px', borderRadius: '8px', marginBottom: '20px'}}>
              <h3>Créer un nouveau compte</h3>
              <input
                type="email"
                placeholder="Email"
                value={newUserEmail}
                onChange={(e) => setNewUserEmail(e.target.value)}
                style={{width: '100%', padding: '10px', marginBottom: '10px', border: '1px solid #ddd', borderRadius: '4px', boxSizing: 'border-box'}}
              />
              <input
                type="text"
                placeholder="Nom complet"
                value={newUserName}
                onChange={(e) => setNewUserName(e.target.value)}
                style={{width: '100%', padding: '10px', marginBottom: '10px', border: '1px solid #ddd', borderRadius: '4px', boxSizing: 'border-box'}}
              />
              <div style={{display: 'flex', gap: '10px', alignItems: 'center', marginBottom: '10px'}}>
                <input
                  type={showNewPassword ? "text" : "password"}
                  placeholder="Mot de passe"
                  value={newUserPassword}
                  onChange={(e) => setNewUserPassword(e.target.value)}
                  style={{flex: 1, padding: '10px', border: '1px solid #ddd', borderRadius: '4px', boxSizing: 'border-box'}}
                />
                <input
                  type="checkbox"
                  checked={showNewPassword}
                  onChange={(e) => setShowNewPassword(e.target.checked)}
                  style={{cursor: 'pointer'}}
                  title="Afficher le mot de passe"
                />
              </div>
              <button onClick={handleCreateUser} style={{backgroundColor: '#10a0dc', color: 'white', border: 'none', padding: '10px 20px', borderRadius: '4px', cursor: 'pointer', fontWeight: 'bold'}}>Créer</button>
            </div>

            {/* Liste des utilisateurs */}
            <div>
              <h3>Utilisateurs existants</h3>
              {users.map(u => (
                <div key={u.id} style={{backgroundColor: '#f9f9f9', padding: '15px', borderRadius: '8px', marginBottom: '10px'}}>
                  <div style={{marginBottom: '10px'}}>
                    <strong>{u.name}</strong> ({u.email})
                  </div>
                  {u.temp_password && (
                    <div style={{backgroundColor: '#fff3cd', padding: '10px', borderRadius: '4px', marginBottom: '10px', fontSize: '13px', display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                      <span>
                        <strong>Mot de passe temporaire:</strong> {showTempPassword[u.id] ? u.temp_password : '••••••••••••'}
                      </span>
                      <button onClick={() => setShowTempPassword({...showTempPassword, [u.id]: !showTempPassword[u.id]})} style={{backgroundColor: '#ffc107', border: 'none', padding: '4px 10px', borderRadius: '4px', cursor: 'pointer', fontSize: '12px', fontWeight: 'bold'}}>
                        {showTempPassword[u.id] ? 'Masquer' : 'Voir'}
                      </button>
                    </div>
                  )}
                  {editingUserId === u.id ? (
                    <div style={{display: 'flex', gap: '10px', alignItems: 'center'}}>
                      <input
                        type={showPassword[u.id] ? "text" : "password"}
                        placeholder="Nouveau mot de passe"
                        value={newPassword}
                        onChange={(e) => setNewPassword(e.target.value)}
                        style={{flex: 1, padding: '10px', border: '1px solid #ddd', borderRadius: '4px'}}
                      />
                      <button
                        onClick={() => setShowPassword({...showPassword, [u.id]: !showPassword[u.id]})}
                        style={{backgroundColor: '#17a2b8', color: 'white', border: 'none', padding: '8px 12px', borderRadius: '4px', cursor: 'pointer', fontWeight: 'bold', fontSize: '12px'}}
                      >
                        {showPassword[u.id] ? 'Masquer' : 'Voir'}
                      </button>
                      <button onClick={() => handleChangePassword(u.id)} style={{backgroundColor: '#10a0dc', color: 'white', border: 'none', padding: '10px 15px', borderRadius: '4px', cursor: 'pointer'}}>Valider</button>
                      <button onClick={() => {setEditingUserId(null); setNewPassword('');}} style={{backgroundColor: '#ccc', border: 'none', padding: '10px 15px', borderRadius: '4px', cursor: 'pointer'}}>Annuler</button>
                    </div>
                  ) : (
                    <div style={{display: 'flex', gap: '10px'}}>
                      <button onClick={() => setEditingUserId(u.id)} style={{backgroundColor: '#ffc107', border: 'none', padding: '8px 15px', borderRadius: '4px', cursor: 'pointer', fontWeight: 'bold'}}>Modifier mot de passe</button>
                      {u.temp_password && (
                        <button onClick={() => setShowTempPassword({...showTempPassword, [u.id]: !showTempPassword[u.id]})} style={{backgroundColor: '#17a2b8', color: 'white', border: 'none', padding: '8px 15px', borderRadius: '4px', cursor: 'pointer', fontWeight: 'bold'}}>
                          {showTempPassword[u.id] ? 'Masquer mot de passe' : 'Voir mot de passe'}
                        </button>
                      )}
                      {u.name !== 'Christian' && (
                        <button onClick={() => handleDeleteUser(u.id, u.name)} style={{backgroundColor: '#dc3545', color: 'white', border: 'none', padding: '8px 15px', borderRadius: '4px', cursor: 'pointer', fontWeight: 'bold'}}>
                          Supprimer
                        </button>
                      )}
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════
    // COMPOSANT : SuspectsNonAttribuesPanel
    // ══════════════════════════════════════════════════
    function SuspectsNonAttribuesPanel({ API_URL, token }) {
      const [loading, setLoading] = React.useState(false);
      const [msg, setMsg] = React.useState(null);
      const [isError, setIsError] = React.useState(false);

      const handleDelete = async () => {
        setMsg(null);
        setIsError(false);
        setLoading(true);
        try {
          // 1. Compter d'abord
          const countRes = await fetch(API_URL + '/societes/suspects-non-attribues/count', {
            headers: { Authorization: 'Bearer ' + token }
          });
          const countData = await countRes.json();
          if (!countRes.ok) throw new Error(countData.error || 'Erreur serveur');
          const count = countData.count;

          if (count === 0) {
            setMsg('Aucune société suspect non attribuée trouvée.');
            setLoading(false);
            return;
          }

          // 2. Demander confirmation
          const confirmed = window.confirm(
            `${count} société${count > 1 ? 's' : ''} suspect${count > 1 ? 's' : ''} non attribuée${count > 1 ? 's' : ''} vont être supprimée${count > 1 ? 's' : ''} définitivement.\n\nCette action est irréversible. Confirmer ?`
          );
          if (!confirmed) {
            setLoading(false);
            return;
          }

          // 3. Supprimer
          const delRes = await fetch(API_URL + '/societes/suspects-non-attribues', {
            method: 'DELETE',
            headers: { Authorization: 'Bearer ' + token }
          });
          const delData = await delRes.json();
          if (!delRes.ok) throw new Error(delData.error || 'Erreur serveur');
          setMsg(`✅ ${delData.deleted} société${delData.deleted > 1 ? 's' : ''} supprimée${delData.deleted > 1 ? 's' : ''}.`);
        } catch (e) {
          setIsError(true);
          setMsg('❌ ' + e.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div style={{marginBottom:'18px',background:'white',border:'1px solid var(--tw-border)',borderRadius:'10px',boxShadow:'0 1px 3px rgba(0,125,137,.06)',overflow:'hidden'}}>
          <div style={{padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span style={{fontSize:'13px',fontWeight:'600',color:'#c0392b'}}>🗑️ Gestion des suspects non attribués</span>
            <button
              onClick={handleDelete}
              disabled={loading}
              style={{padding:'7px 16px',background:loading?'#ccc':'#e74c3c',color:'white',border:'none',borderRadius:'6px',fontSize:'12px',fontWeight:'600',cursor:loading?'default':'pointer',fontFamily:"'DM Sans',sans-serif",whiteSpace:'nowrap'}}
            >
              {loading ? '⏳ Vérification...' : '🗑️ Supprimer les suspects non attribués'}
            </button>
          </div>
          {msg && (
            <div style={{padding:'8px 16px 12px',borderTop:'1px solid var(--tw-border)'}}>
              <div style={{fontSize:'13px',fontWeight:'500',color:isError?'#c0392b':'#2e7d32',background:isError?'#fdecea':'#e8f8f0',border:`1px solid ${isError?'#f5c6c2':'#a8dfc0'}`,borderRadius:'6px',padding:'8px 12px'}}>
                {msg}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ══════════════════════════════════════════════════
    // COMPOSANT : ImportPanel
    // ══════════════════════════════════════════════════
    function ImportPanel({ API_URL, token }) {
      const [open, setOpen] = React.useState(false);
      const [file, setFile] = React.useState(null);
      const [loading, setLoading] = React.useState(false);
      const [result, setResult] = React.useState(null);
      const [error, setError] = React.useState(null);
      const fileRef = React.useRef();

      const handleImport = async () => {
        if (!file) return;
        setLoading(true);
        setResult(null);
        setError(null);
        try {
          const formData = new FormData();
          formData.append('file', file);
          const res = await fetch(API_URL + '/import', {
            method: 'POST',
            headers: { Authorization: 'Bearer ' + token },
            body: formData
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Erreur serveur');
          setResult(data);
          setFile(null);
          if (fileRef.current) fileRef.current.value = '';
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div style={{marginBottom:'18px',background:'white',border:'1px solid var(--tw-border)',borderRadius:'10px',boxShadow:'0 1px 3px rgba(0,125,137,.06)',overflow:'hidden'}}>
          <div onClick={() => setOpen(o => !o)}
            style={{padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer',userSelect:'none'}}
            onMouseEnter={e=>e.currentTarget.style.background='var(--tw-teal-light)'}
            onMouseLeave={e=>e.currentTarget.style.background='white'}
          >
            <span style={{fontSize:'13px',fontWeight:'600',color:'var(--tw-teal)'}}>📥 Import Excel — Sociétés & Contacts</span>
            <span style={{fontSize:'12px',color:'var(--tw-muted)'}}>{open ? '▲ Fermer' : '▼ Ouvrir'}</span>
          </div>
          {open && (
            <div style={{padding:'0 16px 16px',borderTop:'1px solid var(--tw-border)'}}>
              <div style={{marginTop:'14px',display:'flex',flexDirection:'column',gap:'12px'}}>

                {/* Info template */}
                <div style={{background:'var(--tw-teal-light)',border:'1px solid var(--tw-border)',borderRadius:'6px',padding:'10px 14px',fontSize:'12px',color:'var(--tw-teal)',lineHeight:'1.6'}}>
                  <b>Format attendu :</b> fichier Excel avec 2 onglets <b>Societes</b> et <b>Contacts</b>.<br/>
                  Colonnes Societes : <i>nom_societe*, statut*, adresse, cp, ville, pays, telephone, email_societe, site_web, secteur, notes</i><br/>
                  Colonnes Contacts : <i>nom_societe*, civilite, prenom, nom*, fonction, telephone, email, contact_principal</i><br/>
                  Statut accepté : <b>Suspect / Prospect / Client</b> — Les doublons sont mis à jour. Les sociétés importées sont <b>non attribuées</b>.
                </div>

                {/* Sélecteur fichier */}
                <div style={{display:'flex',gap:'10px',alignItems:'center',flexWrap:'wrap'}}>
                  <input ref={fileRef} type="file" accept=".xlsx,.xls"
                    onChange={e => { setFile(e.target.files[0]); setResult(null); setError(null); }}
                    style={{fontSize:'13px',color:'var(--tw-ink)',flex:1,minWidth:'200px'}}
                  />
                  <button onClick={handleImport} disabled={!file || loading}
                    style={{padding:'8px 18px',background:(!file||loading)?'#ccc':'var(--tw-teal)',color:'white',border:'none',borderRadius:'6px',fontSize:'13px',fontWeight:'600',cursor:(!file||loading)?'default':'pointer',fontFamily:"'DM Sans',sans-serif",whiteSpace:'nowrap'}}>
                    {loading ? '⏳ Import...' : '📥 Importer'}
                  </button>
                </div>

                {/* Résultat */}
                {result && (
                  <div style={{background:'#e8f8f0',border:'1px solid #a8dfc0',borderRadius:'6px',padding:'12px 14px',fontSize:'13px',lineHeight:'1.8'}}>
                    <div style={{fontWeight:'700',color:'#2e7d32',marginBottom:'4px'}}>✅ Import terminé</div>
                    <div>🏢 Sociétés créées : <b>{result.created}</b></div>
                    <div>🔄 Sociétés mises à jour : <b>{result.updated}</b></div>
                    <div>👤 Contacts ajoutés : <b>{result.contactsAdded}</b></div>
                    {result.errors && result.errors.length > 0 && (
                      <div style={{marginTop:'8px',color:'#c0392b'}}>
                        <b>⚠ {result.errors.length} erreur(s) :</b>
                        <ul style={{margin:'4px 0 0 16px',fontSize:'12px'}}>
                          {result.errors.slice(0,5).map((e,i) => <li key={i}>{e}</li>)}
                          {result.errors.length > 5 && <li>...et {result.errors.length-5} autres</li>}
                        </ul>
                      </div>
                    )}
                    <div style={{marginTop:'8px',fontSize:'12px',color:'var(--tw-slate)'}}>Rechargez la page pour voir les nouvelles sociétés.</div>
                  </div>
                )}
                {error && (
                  <div style={{background:'#fdecea',border:'1px solid #f5c6c2',borderRadius:'6px',padding:'10px 14px',fontSize:'13px',color:'var(--tw-red)'}}>
                    ❌ {error}
                  </div>
                )}

              </div>
            </div>
          )}
        </div>
      );
    }

                <div style={styles.prospectStatusRow}>

                             'var(--tw-teal)'}}>
                      {prospect.real_status}
                      {prospect.real_probability && prospect.real_probability > 0 && (

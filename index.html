                              )}
                            </div>
                            <label style={{display:'flex',alignItems:'center',gap:'6px',fontSize:'12px',cursor:'pointer',color:'#4a6868'}} title="Le contact accepte de recevoir des notes d'information (changements tarifs, infos produit, alertes service)">
                              <input type="checkbox" checked={!!interlocuteurForm.accept_notes_info} onChange={e=>setInterlocuteurForm({...interlocuteurForm,accept_notes_info:e.target.checked})} />
                              <span style={{display:'inline-flex',alignItems:'center'}}>{I(ICONS.bell, 13)}</span>
                              Notes d'information
                            </label>
                            {/* Case "Demande d'opt-in" :
                                Visible pour Suspect/Prospect (règle métier) + contact pas déjà opt-in.
                                Comportement :
                                  - En édition (fiche déjà en BDD) : toggle persiste immédiatement
                                    via POST /api/interlocuteurs/:id/demande-optin (changement à chaud).
                                  - En création (fiche pas encore sauvegardée) : mise à jour du state
                                    local uniquement. La valeur sera envoyée dans le POST de création
                                    via le champ demande_optin du body. */}
                            {['Suspect', 'Prospect'].includes(selectedProspect?.statut_societe) &&
                             !interlocuteurForm.accept_emailing && (
                              <label style={{display:'flex',alignItems:'center',gap:'6px',fontSize:'12px',cursor:'pointer',color:'#4a6868'}} title="Marquer ce contact pour qu'il reçoive un email de demande d'opt-in (lien de confirmation à cliquer)">
                                <input
                                  type="checkbox"
                                  checked={!!interlocuteurForm.demande_optin}
                                  onChange={async (e) => {
                                    const newValue = e.target.checked;
                                    // Cas 1 : création (pas encore d'id) → simple update state local
                                    if (!interlocuteurForm.id) {
                                      setInterlocuteurForm(f => ({...f, demande_optin: newValue}));
                                      return;
                                    }
                                    // Cas 2 : édition → optimistic update + persistance API
                                    setInterlocuteurForm(f => ({...f, demande_optin: newValue}));
                                    try {
                                      const r = await fetch(`${API_URL}/interlocuteurs/${interlocuteurForm.id}/demande-optin`, {
                                        method: 'POST',
                                        headers: { 'Authorization': `Bearer ${user.token}`, 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ value: newValue })
                                      });
                                      const data = await r.json();
                                      if (!r.ok) {
                                        // Rollback en cas d'erreur
                                        setInterlocuteurForm(f => ({...f, demande_optin: !newValue}));
                                        alert('Erreur : ' + (data.error || 'Impossible de mettre à jour'));
                                      }
                                    } catch (err) {
                                      setInterlocuteurForm(f => ({...f, demande_optin: !newValue}));
                                      alert('Erreur réseau : ' + err.message);
                                    }
                                  }}
                                />
                                <span style={{display:'inline-flex',alignItems:'center',color:'#b97800'}}>{I(ICONS.mail, 13)}</span>
                                Demande d'opt-in
                              </label>
                            )}
                          </div>
                          {/* Bouton Historique RGPD : visible uniquement en mode édition */}
                          {isEdit && (
                            <div style={{marginBottom:'12px'}}>
                              <button type="button" onClick={toggleHistory}
                                style={{display:'inline-flex',alignItems:'center',gap:'6px',padding:'5px 10px',background:'white',border:'0.5px solid var(--tw-border)',borderRadius:'6px',fontSize:'12px',color:'var(--tw-slate)',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>
                                {I(ICONS.clock, 12)}
                                {historyExpanded ? 'Masquer l\u2019historique RGPD' : 'Afficher l\u2019historique RGPD'}
                              </button>
                              {historyExpanded && (
                                <div style={{marginTop:'8px',padding:'10px 12px',background:'white',border:'0.5px solid var(--tw-border)',borderRadius:'6px',maxHeight:'240px',overflowY:'auto'}}>
                                  {historyLoading && <div style={{fontSize:'12px',color:'var(--tw-muted)',fontStyle:'italic'}}>Chargement…</div>}
                                  {historyError && <div style={{fontSize:'12px',color:'var(--tw-red)'}}>Erreur : {historyError}</div>}
                                  {!historyLoading && !historyError && historyData.length === 0 && (
                                    <div style={{fontSize:'12px',color:'var(--tw-muted)',fontStyle:'italic'}}>Aucun événement enregistré.</div>
                                  )}
                                  {!historyLoading && !historyError && historyData.length > 0 && (
                                    <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                                      {historyData.map(ev => {
                                        const dt = ev.changed_at ? new Date(ev.changed_at) : null;
                                        const dtStr = dt ? dt.toLocaleString('fr-FR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '?';
                                        const fromTo = ev.old_value === null
                                          ? (ev.new_value ? '✅ activé' : '❌ désactivé')
                                          : `${ev.old_value ? '✅' : '❌'} → ${ev.new_value ? '✅' : '❌'}`;
                                        return (
                                          <div key={ev.id} style={{display:'flex',gap:'10px',alignItems:'baseline',fontSize:'12px',padding:'4px 0',borderBottom:'0.5px solid var(--tw-bg)'}}>
                                            <span style={{color:'var(--tw-muted)',fontFamily:'monospace',whiteSpace:'nowrap',fontSize:'11px'}}>{dtStr}</span>
                                            <span style={{fontWeight:'600',color:'var(--tw-ink)'}}>{fieldLabel(ev.field)}</span>
                                            <span>{fromTo}</span>
                                            <span style={{color:'var(--tw-muted)',fontSize:'11px'}}>· {sourceLabel(ev.source)}{ev.changed_by ? ` · ${ev.changed_by}` : ''}</span>
                                          </div>
                                        );
                                      })}
                                    </div>
                                  )}
                                </div>
                              )}
                            </div>
                          )}
                          <div style={{display:'flex',gap:'8px',justifyContent:'flex-end'}}>
                            <button onClick={closeContactForm} style={{padding:'6px 14px',border:'1px solid var(--tw-border)',borderRadius:'6px',background:'white',cursor:'pointer',fontSize:'13px',fontFamily:"'DM Sans',sans-serif"}}>Annuler</button>
                            <button onClick={async () => { await handleSaveInterlocuteur(); setHistoryExpanded(false); setHistoryData([]); }} style={{padding:'6px 14px',background:'var(--tw-teal)',color:'white',border:'none',borderRadius:'6px',cursor:'pointer',fontSize:'13px',fontWeight:'600',fontFamily:"'DM Sans',sans-serif"}}>Enregistrer</button>
                          </div>
                        </div>
                      );

                      // Mode création = formulaire ouvert ET pas d'id (donc nouveau contact)
                      const isCreating = showInterlocuteurForm && !interlocuteurForm.id;
                      // Mode édition = formulaire ouvert AVEC un id
                      const editingId = (showInterlocuteurForm && interlocuteurForm.id) ? interlocuteurForm.id : null;

                      // ─── Drag & drop des contacts ───────────────────────────
                      // États draggedContactId / dragOverContactId définis au niveau App
                      // (passés en props à RightPanel) pour respecter les règles des hooks React.

                      const handleDragStart = (e, contactId) => {
                        setDraggedContactId(contactId);
                        e.dataTransfer.effectAllowed = 'move';
                        // Note : nécessaire pour Firefox sinon le drag ne démarre pas
                        try { e.dataTransfer.setData('text/plain', String(contactId)); } catch (_) {}
                      };
                      const handleDragOver = (e, contactId) => {
                        e.preventDefault(); // autorise le drop
                        e.dataTransfer.dropEffect = 'move';
                        if (dragOverContactId !== contactId) setDragOverContactId(contactId);
                      };
                      const handleDragEnd = () => {
                        setDraggedContactId(null);
                        setDragOverContactId(null);
                      };
                      const handleDrop = async (e, targetContactId) => {
                        e.preventDefault();
                        const sourceId = draggedContactId;
                        setDraggedContactId(null);
                        setDragOverContactId(null);
                        if (!sourceId || sourceId === targetContactId) return;

                        // Calculer le nouvel ordre côté front (optimistic update)
                        const currentList = [...interlocuteurs];
                        const fromIdx = currentList.findIndex(c => c.id === sourceId);
                        const toIdx = currentList.findIndex(c => c.id === targetContactId);
                        if (fromIdx < 0 || toIdx < 0) return;
                        const [moved] = currentList.splice(fromIdx, 1);
                        currentList.splice(toIdx, 0, moved);
                        const orderedIds = currentList.map(c => c.id);

                        // Appel API pour persister
                        try {
                          const res = await fetch(`${API_URL}/prospects/${selectedProspect.id}/interlocuteurs/reorder`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${user.token}` },
                            body: JSON.stringify({ orderedIds })
                          });
                          if (!res.ok) throw new Error(`HTTP ${res.status}`);
                          // Recharger pour avoir l'ordre persisté
                          if (typeof fetchInterlocuteurs === 'function') await fetchInterlocuteurs(selectedProspect.id);
                        } catch (err) {
                          console.error('Erreur reorder:', err);
                          window.showToast({ title: 'Erreur réorganisation : ' + err.message, type: 'error' });
                        }
                      };

                      // Reset de l'ordre custom : tous les contacts repassent au tri auto
                      const handleResetOrder = async () => {
                        try {
                          const res = await fetch(`${API_URL}/prospects/${selectedProspect.id}/interlocuteurs/reset-order`, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${user.token}` }
                          });
                          if (!res.ok) throw new Error(`HTTP ${res.status}`);
                          window.showToast({ title: 'Ordre réinitialisé', type: 'success' });
                          if (typeof fetchInterlocuteurs === 'function') await fetchInterlocuteurs(selectedProspect.id);
                        } catch (err) {
                          window.showToast({ title: 'Erreur reset : ' + err.message, type: 'error' });
                        }
                      };

                      // Détection : au moins un contact a un display_order custom ?
                      const hasCustomOrder = interlocuteurs.some(c => c.display_order != null);

                      return (
                        <React.Fragment>
                          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
                            <div style={{fontSize:'11px',fontWeight:'600',textTransform:'uppercase',letterSpacing:'.5px',color:'var(--tw-muted)',display:'flex',alignItems:'center',gap:'10px'}}>
                              Contacts
                              {hasCustomOrder && (
                                <button onClick={handleResetOrder}
                                  title="Revenir au tri automatique (Principal/Décideur en haut)"
                                  style={{padding:'2px 8px',background:'transparent',border:'0.5px solid var(--tw-border)',borderRadius:'10px',fontSize:'10px',fontWeight:'500',color:'var(--tw-muted)',cursor:'pointer',fontFamily:"'DM Sans',sans-serif",textTransform:'none',letterSpacing:0}}>
                                  ↺ Réinitialiser l'ordre
                                </button>
                              )}
                            </div>
                            <button onClick={() => { setHistoryExpanded(false); setHistoryData([]); setInterlocuteurForm({prenom:'',nom:'',fonction:'',email:'',telephone:'',linkedin_url:'',principal:false,decideur:false,accept_emailing:false,accept_notes_info:false,demande_optin:false}); setShowInterlocuteurForm(true); }}
                              style={{padding:'5px 12px',background:'var(--tw-teal)',color:'white',border:'none',borderRadius:'6px',fontSize:'12px',fontWeight:'600',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>+ Contact</button>
                          </div>

                          {/* Formulaire CRÉATION : en haut, uniquement si pas d'id */}
                          {isCreating && renderContactForm(false)}

                          {interlocuteurs.length === 0 ? (
                            <div style={{fontSize:'13px',color:'var(--tw-muted)',fontStyle:'italic',padding:'10px 0'}}>Aucun contact</div>
                          ) : interlocuteurs.map(c => {
                            const avatarColors = ['var(--tw-teal)','#667eea','#f0932b','#2ec27e','#e74c3c','#9b59b6'];
                            const col = avatarColors[c.id % avatarColors.length];
                            const ini = displayInitials(c);
                            const isEditingThis = editingId === c.id;
                            const isDragging = draggedContactId === c.id;
                            const isDragOver = dragOverContactId === c.id && draggedContactId !== c.id;
                            return (
                              <React.Fragment key={c.id}>
                                <div
                                  draggable={!isEditingThis}
                                  onDragStart={(e) => handleDragStart(e, c.id)}
                                  onDragOver={(e) => handleDragOver(e, c.id)}
                                  onDragEnd={handleDragEnd}
                                  onDrop={(e) => handleDrop(e, c.id)}
                                  style={{
                                    display:'flex',alignItems:'center',gap:'10px',padding:'10px 12px',borderRadius:'6px',background:'var(--tw-bg)',marginBottom:'6px',
                                    opacity: isDragging ? 0.4 : 1,
                                    border: isDragOver ? '2px dashed var(--tw-teal)' : '2px solid transparent',
                                    transition: 'opacity 0.15s, border-color 0.15s',
                                    cursor: isEditingThis ? 'default' : 'move'
                                  }}>
                                  {/* Handle drag : icône à grip à gauche, visible mais discrète.
                                      Toute la ligne est draggable, mais le handle indique visuellement la prise. */}
                                  <span title="Glisser pour réordonner" style={{flexShrink:0,color:'var(--tw-muted)',fontSize:'14px',cursor:'grab',userSelect:'none',lineHeight:1}}>⋮⋮</span>
                                  <div style={{width:'34px',height:'34px',borderRadius:'50%',background:col,color:'white',fontWeight:'600',fontSize:'12px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{ini}</div>
                                  <div style={{flex:1,minWidth:0}}>
                                    <div style={{fontSize:'13px',fontWeight:'600',color:'var(--tw-ink)'}}>{displayName(c)}</div>
                                    <div style={{fontSize:'11px',color:'var(--tw-muted)',marginTop:'2px',display:'flex',gap:'10px',flexWrap:'wrap'}}>
                                      {c.fonction && <span>{c.fonction}</span>}
                                      {c.email && <a href={`mailto:${c.email}`} style={{color:'var(--tw-teal)',textDecoration:'none'}}>✉ {c.email}</a>}
                                      {c.telephone && <a href={`tel:${c.telephone}`} style={{color:'var(--tw-slate)',textDecoration:'none'}}>📞 {c.telephone}</a>}
                                      {c.linkedin_url && <a href={c.linkedin_url} target="_blank" rel="noopener noreferrer" title="Profil LinkedIn" style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:'18px',height:'18px',borderRadius:'3px',background:'#0a66c2',color:'white',fontSize:'9px',fontWeight:700,textDecoration:'none'}}>in</a>}
                                    </div>
                                  </div>
                                  <div style={{display:'flex',gap:'5px',alignItems:'center',flexShrink:0}}>
                                    {c.accept_emailing && <span title="Accepte les emailings commerciaux" style={{display:'inline-flex',alignItems:'center',padding:'3px 5px',borderRadius:'8px',background:'#dcfce7',color:'#166534'}}>{I(ICONS.mail, 12)}</span>}
                                    {c.accept_notes_info && <span title="Accepte les notes d'information" style={{display:'inline-flex',alignItems:'center',padding:'3px 5px',borderRadius:'8px',background:'#dbeafe',color:'#1e40af'}}>{I(ICONS.bell, 12)}</span>}
                                    {c.decideur && <span style={{fontSize:'10px',fontWeight:'600',padding:'2px 7px',borderRadius:'8px',background:'#fdecea',color:'var(--tw-red)'}}>Décideur</span>}
                                    {c.principal && <span style={{fontSize:'10px',fontWeight:'600',padding:'2px 7px',borderRadius:'8px',background:'var(--tw-teal-light)',color:'var(--tw-teal)'}}>Principal</span>}
                                    <IconBtn title="Modifier le contact"
                                      onClick={() => { setHistoryExpanded(false); setHistoryData([]); setInterlocuteurForm({id:c.id,prenom:c.prenom||'',nom:c.nom||'',fonction:c.fonction||'',email:c.email||'',telephone:c.telephone||'',linkedin_url:c.linkedin_url||'',principal:!!c.principal,decideur:!!c.decideur,accept_emailing:!!c.accept_emailing,accept_notes_info:!!c.accept_notes_info,demande_optin:!!c.demande_optin,emailing_unsubscribed_at:c.emailing_unsubscribed_at||null,emailing_unsubscribed_source:c.emailing_unsubscribed_source||null}); setShowInterlocuteurForm(true); }}
                                    >{I(ICONS.edit, 13)}</IconBtn>
                                    <IconBtn title="Supprimer le contact" danger
                                      onClick={() => handleDeleteInterlocuteur(c.id)}
                                    >{I(ICONS.trash, 13)}</IconBtn>
                                  </div>
                                </div>
                                {/* Formulaire ÉDITION : sous la ligne du contact concerné */}
                                {isEditingThis && renderContactForm(true)}
                              </React.Fragment>
                            );
                          })}
                        </React.Fragment>
                      );
                    })()}
                  </div>
                )}

                                {/* ── Onglet Licences ── */}
                {clientTab === 'licences' && (
                  <div>
                    {/* Version TexasWin dans Licences */}
                    <div style={{display:'flex',alignItems:'center',gap:'12px',background:'var(--tw-bg)',borderRadius:'8px',padding:'10px 14px',marginBottom:'16px'}}>
                      <span style={{fontSize:'11px',color:'var(--tw-muted)',fontWeight:'600',textTransform:'uppercase',letterSpacing:'.4px',flexShrink:0}}>Version TexasWin</span>
                      <input type="text"
                        value={selectedProspect.tw_version||''}
                        placeholder="Ex: 12.4.2"
                        onChange={async (e) => {
                          const v = e.target.value;
                          onUpdateProspect({...selectedProspect, tw_version: v});
                        }}
                        onBlur={async (e) => {
                          try {
                            await fetch(`${API_URL}/prospects/${selectedProspect.id}`, {
                              method:'PUT', headers:{'Content-Type':'application/json','Authorization':`Bearer ${user.token}`},
                              body: JSON.stringify({...selectedProspect, tw_version: e.target.value})
                            });
                          } catch(err) { console.error(err); }
                        }}
                        style={{flex:1,padding:'5px 10px',border:'1px solid var(--tw-border)',borderRadius:'6px',fontSize:'13px',fontFamily:"'DM Sans',sans-serif",background:'white'}}
                      />
                    </div>

                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}}>
                      <span style={{fontSize:'12px',color:'var(--tw-muted)',fontWeight:'600',textTransform:'uppercase',letterSpacing:'.5px'}}>Licences actives</span>
                      <button onClick={() => { setEditingLicence(null); setLicenceForm({licence_id:'',nb_utilisateurs:0,facturation:'saas_mensuel',hebergement:'cloud',maintenance:'aucune',date_contrat:'',notes:''}); setShowLicenceForm(true); }}
                        style={{padding:'5px 12px',background:'var(--tw-teal)',color:'white',border:'none',borderRadius:'6px',fontSize:'12px',fontWeight:'600',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>
                        + Licence
                      </button>
                    </div>

                    {showLicenceForm && (
                      <div style={{background:'var(--tw-bg)',border:'1px solid var(--tw-border)',borderRadius:'8px',padding:'16px',marginBottom:'14px'}}>
                        {/* Ligne 1 : tous les champs sauf Notes */}
                        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr auto 1fr 1fr 1fr',gap:'8px',marginBottom:'10px',alignItems:'end'}}>
                          <div>
                            <label style={{fontSize:'11px',color:'var(--tw-muted)',fontWeight:'600',textTransform:'uppercase',display:'block',marginBottom:'4px'}}>Module</label>
                            <div style={{position:'relative'}}>
                              <div onClick={() => setShowModuleDropdown(s=>!s)}
                                style={{width:'100%',padding:'7px 10px',border:'1px solid var(--tw-border)',borderRadius:'6px',fontSize:'13px',fontFamily:"'DM Sans',sans-serif",background:'white',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                <span style={{color:licenceForm.licence_id?'var(--tw-ink)':'var(--tw-muted)'}}>
                                  {licenceForm.licence_id ? (refLicences.find(l=>String(l.id)===String(licenceForm.licence_id))?.nom||'— Choisir —') : '— Choisir —'}
                                </span>
                                <span style={{fontSize:'10px',color:'var(--tw-muted)'}}>▼</span>
                              </div>
                              {showModuleDropdown && (
                                <div style={{position:'absolute',top:'100%',left:0,right:0,zIndex:999,background:'white',border:'1px solid var(--tw-border)',borderRadius:'6px',boxShadow:'0 4px 16px rgba(0,0,0,.12)',maxHeight:'280px',overflowY:'auto',marginTop:'2px'}}>
                                  {[
                                    {groupe:'Famille Biz/Fab', modules:['Biz','Biz + Fab','Fab']},
                                    {groupe:'Famille Net', modules:['Net B2B','Net Agents seuls','Net B2B + Agents']},
                                    {groupe:'Famille Commerce', modules:['Mag','VRP','Col']},
                                    {groupe:'Famille Logistique', modules:['Log','Jet']},
                                    {groupe:'Standalone', modules:['Kub','Flux','Facturation Électronique','Compta SAGE']},
                                  ].map((g, gi) => (
                                    <div key={g.groupe}>
                                      {gi > 0 && <div style={{height:'1px',background:'var(--tw-border)',margin:'4px 0'}}></div>}
                                      <div style={{padding:'6px 12px 3px',fontSize:'11px',fontWeight:'700',color:'var(--tw-ink)',textTransform:'uppercase',letterSpacing:'.4px',pointerEvents:'none'}}>{g.groupe}</div>
                                      {g.modules.map(nom => {
                                        const l = refLicences.find(r => r.nom === nom);
                                        if (!l) return null;
                                        return (
                                          <div key={l.id}
                                            onClick={() => { setLicenceForm({...licenceForm,licence_id:String(l.id)}); setShowModuleDropdown(false); }}
                                            style={{padding:'7px 12px 7px 22px',fontSize:'13px',color:'var(--tw-slate)',cursor:'pointer',background:String(licenceForm.licence_id)===String(l.id)?'var(--tw-teal-light)':'white'}}
                                            onMouseEnter={e=>e.currentTarget.style.background='var(--tw-teal-light)'}
                                            onMouseLeave={e=>e.currentTarget.style.background=String(licenceForm.licence_id)===String(l.id)?'var(--tw-teal-light)':'white'}
                                          >{l.nom}</div>
                                        );
                                      })}
                                    </div>
                                  ))}
                                </div>
                              )}
                            </div>
                          </div>
                          <div>
                            <label style={{fontSize:'11px',color:'var(--tw-muted)',fontWeight:'600',textTransform:'uppercase',display:'block',marginBottom:'4px'}}>Facturation</label>
                            <select value={licenceForm.facturation||'saas_mensuel'} onChange={e=>setLicenceForm({...licenceForm,facturation:e.target.value})}
                              style={{width:'100%',padding:'7px 10px',border:'1px solid var(--tw-border)',borderRadius:'6px',fontSize:'13px',fontFamily:"'DM Sans',sans-serif"}}>
                              <option value="perpetuelle">🔑 Perpétuelle</option>
                              <option value="saas_mensuel">📅 SaaS mensuel</option>
                              <option value="saas_annuel">📆 SaaS annuel</option>
                            </select>
                          </div>
                          <div>
                            <label style={{fontSize:'11px',color:'var(--tw-muted)',fontWeight:'600',textTransform:'uppercase',display:'block',marginBottom:'4px'}}>Nb utilisateurs</label>
                            <input type="number" value={licenceForm.nb_utilisateurs} onChange={e=>setLicenceForm({...licenceForm,nb_utilisateurs:parseInt(e.target.value)||0})}
                              style={{width:'100%',padding:'7px 10px',border:'1px solid var(--tw-border)',borderRadius:'6px',fontSize:'13px',fontFamily:"'DM Sans',sans-serif"}} />
                          </div>
                          <div>
                            <label style={{fontSize:'11px',color:'var(--tw-muted)',fontWeight:'600',textTransform:'uppercase',display:'block',marginBottom:'4px'}}>Hébergement</label>
                            <select value={licenceForm.hebergement} onChange={e=>setLicenceForm({...licenceForm,hebergement:e.target.value})}
                              style={{width:'100%',padding:'7px 10px',border:'1px solid var(--tw-border)',borderRadius:'6px',fontSize:'13px',fontFamily:"'DM Sans',sans-serif"}}>
                              <option value="cloud">☁️ Cloud ASTI</option>
                              <option value="onpremise">🏢 On-premise</option>
                            </select>
                          </div>
                          <div>
                            <label style={{fontSize:'11px',color:(licenceForm.facturation||'saas_mensuel')!=='perpetuelle'?'#ccc':'var(--tw-muted)',fontWeight:'600',textTransform:'uppercase',display:'block',marginBottom:'4px'}}>Maintenance</label>
                            <select value={licenceForm.maintenance}

                        </div>
                      </div>
                      <div style={{display: 'flex', gap: '8px'}}>

                          type="button"
                          onClick={async () => {
                            try {
                              const res = await fetch(`${API_URL}/devis/${editingDevis.id}/download-pdf`, {
                                headers: { 'Authorization': `Bearer ${user.token}` }
                              });
                              if (res.ok) {
                                const blob = await res.blob();
                                const url = window.URL.createObjectURL(blob);
                                window.open(url, '_blank');
                              }
                            } catch (err) {
                              window.showToast({title:'Erreur: ' + err.message, type:'error'});
                            }
                          }}
                          style={{padding: '6px 12px', backgroundColor: '#007d89', color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer', fontSize: '12px', fontWeight: '600'}}

                          📄 Télécharger
                        </button>

                          type="button"

                              await handleDeleteDevisPDF(editingDevis.id);

                              const updatedDevisList = await fetch(`${API_URL}/prospects/${selectedProspect.id}/devis`, {
                                headers: { 'Authorization': `Bearer ${user.token}` }
                              }).then(r => r.json());
                              const updatedDevis = updatedDevisList.find(d => d.id === editingDevis.id);
                              if (updatedDevis) {
                                handleEditDevis(updatedDevis);
                              }
                            }
                          }}

                      const newProb = probMap[status] !== undefined ? probMap[status] : devisFormData.chance_percent;
                      setDevisFormData({...devisFormData, devis_status: status, chance_percent: newProb});

                    style={{padding: '8px', border: '1px solid #ddd', borderRadius: '4px', width: '100%', fontSize: '14px'}}

  <!-- ====================================================================
       COUCHE DE NAVIGATION RAPIDE (overlay) — montée dans un SECOND root React,
       par-dessus l'app existante (rien n'est remplacé). Tout est encapsulé dans
       une IIFE pour ne PAS entrer en collision avec les `const` globaux du bloc
       principal (Babel compile les deux scripts dans la portée globale).
       Dépendances : React/ReactDOM (globaux) + window.NavApi (services/navApi.js).

  <script type="text/babel">
  (function () {
    'use strict';
    const { useState, useEffect, useRef, useCallback } = React;

      .twnav-search{ display:flex; align-items:center; gap:12px; padding:17px 20px; border-bottom:1px solid var(--twline); }
      .twnav-search > svg{ color:var(--twb); flex-shrink:0; }

      .twnav-search input::placeholder{ color:#a8b4bd; }

      @keyframes twspin{ to{transform:rotate(360deg)} }

      .twnav-peek-head b{ font-size:15px; font-weight:600; }
      .twnav-peek-head span{ font-size:11.5px; color:var(--twink-soft); display:block; }
      .twnav-peek-close{ margin-left:auto; width:30px; height:30px; border:1px solid var(--twline); background:var(--twwhite); border-radius:7px; cursor:pointer; color:var(--twink-soft); font-size:16px; }
      .twnav-peek-body{ flex:1; overflow-y:auto; padding:18px 20px; }
      .twnav-peek-body .f{ margin-bottom:13px; }
      .twnav-peek-body .f label{ display:block; font-size:11px; font-weight:600; color:var(--twink-soft); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
      .twnav-peek-body .f .v{ font-size:14px; color:var(--twink); }
      .twnav-peek-foot{ padding:14px 20px; border-top:1px solid var(--twline); display:flex; gap:8px; }
      .twnav-btn{ flex:1; justify-content:center; display:flex; align-items:center; gap:7px; font-family:inherit; font-size:12.5px;
        font-weight:500; padding:9px 13px; border-radius:8px; border:1px solid var(--twline); background:var(--twwhite); color:var(--twink); cursor:pointer; }
      .twnav-btn.primary{ background:var(--twb); color:#fff; border-color:var(--twb); }
      .twnav-btn.primary:hover{ background:var(--twb-dark); }
      .twnav-toast{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:#1a2733; color:#fff;
        font-size:13px; padding:12px 20px; border-radius:10px; box-shadow:var(--twshadow); transition:.25s cubic-bezier(.2,.8,.3,1); z-index:9200; }
      .twnav-toast.show{ transform:translateX(-50%) translateY(0); }
      /* Objet lié réutilisable (LinkedObject) — pour brancher les écrans en phase 2 */
      .twnav-lk{ color:var(--twb); cursor:pointer; font-weight:500; border-bottom:1px dotted rgba(18,160,220,.5); white-space:nowrap; }
      .twnav-lk:hover{ border-bottom-style:solid; background:var(--twb-ghost); border-radius:3px; }
    `;

    /* ---------- Icônes (chemins SVG inline) ---------- */
    const PATHS = {
      users: '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.9"/>',
      cart:  '<circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/>',
      doc:   '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/>',
      plus:  '<path d="M12 5v14M5 12h14"/>',
      clock: '<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
      star:  '<path d="M12 2l3 6.5 7 .9-5 4.9 1.2 7L12 18l-6.4 3.3L7 14.3l-5-4.9 7-.9z"/>',
      search:'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/>',
      eye:   '<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/>',
      home:  '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/>',
    };
    const Icon = ({ name, size = 16 }) => React.createElement('svg', {
      viewBox: '0 0 24 24', width: size, height: size, fill: 'none', stroke: 'currentColor',
      strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round',
      dangerouslySetInnerHTML: { __html: PATHS[name] || PATHS.search }
    });

    /* ---------- Surlignage du terme recherché (sans innerHTML, anti-XSS) ---------- */
    function highlight(text, q) {
      text = String(text == null ? '' : text);
      if (!q) return text;
      const i = text.toLowerCase().indexOf(q.toLowerCase());
      if (i < 0) return text;
      return [text.slice(0, i), <mark key="m">{text.slice(i, i + q.length)}</mark>, text.slice(i + q.length)];
    }

    /* ---------- Récents (session courante uniquement, pas localStorage) ---------- */
    function loadRecents() { try { return JSON.parse(sessionStorage.getItem('tw_nav_recents') || '[]'); } catch (e) { return []; } }
    function saveRecent(item) {
      let recents = loadRecents().filter(r => r.id !== item.id);
      recents = [item, ...recents].slice(0, 5);
      try { sessionStorage.setItem('tw_nav_recents', JSON.stringify(recents)); } catch (e) {}
      return recents;
    }

    /* ---------- Helpers de couplage avec l'app existante (events) ---------- */
    function navigateTo(detail) { window.dispatchEvent(new CustomEvent('tw:navigate', { detail })); }

    /* ===================================================================
       PEEK PANEL — aperçu latéral droit (getPeek). Piloté par un token pour
       ignorer les réponses périmées (anti-race), comme la recherche.
       =================================================================== */
    function PeekPanel({ peek, onClose }) {
      const open = !!peek;
      const data = peek && peek.data;
      return (
        <div className={'twnav-peek' + (open ? ' open' : '')} role="complementary" aria-hidden={!open}>
          {data && (
            <React.Fragment>
              <div className="twnav-peek-head">
                <div className="ic"><Icon name={data.icon} size={18} /></div>
                <div><b>{data.title}</b><span>{data.sub}</span></div>
                <button className="twnav-peek-close" onClick={onClose} aria-label="Fermer l'aperçu">×</button>
              </div>
              <div className="twnav-peek-body">
                {(data.fields || []).map((f, i) => (
                  <div className="f" key={i}><label>{f[0]}</label><div className="v">{f[1]}</div></div>
                ))}
              </div>
              <div className="twnav-peek-foot">
                <button className="twnav-btn primary" onClick={() => { navigateTo({ prospectId: data.prospectId, affaireId: data.affaireId }); onClose(); }}>
                  Ouvrir la fiche
                </button>
              </div>
            </React.Fragment>
          )}
          {peek && peek.loading && !data && (
            <div className="twnav-peek-head"><div className="ic"><div className="twnav-spin" /></div><div><b>Chargement…</b></div></div>
          )}
        </div>
      );
    }

    /* ===================================================================
       OVERLAY — possède la palette, le peek et le toast, et écoute les
       raccourcis clavier + les events globaux.
       =================================================================== */
    function Overlay() {
      const [open, setOpen] = useState(false);
      const [nav, setNav] = useState({ ecrans: [], actions: [] });
      const [q, setQ] = useState('');
      const [records, setRecords] = useState([]);
      const [loading, setLoading] = useState(false);
      const [sel, setSel] = useState(0);
      const [recents, setRecents] = useState(loadRecents());
      const [peek, setPeek] = useState(null);       // { loading } | { data }
      const [toast, setToast] = useState('');

      const inputRef = useRef(null);
      const verRef = useRef(0);        // token de version recherche (anti-race)
      const debRef = useRef(null);     // timer de débounce
      const peekVerRef = useRef(0);    // token de version peek (anti-race)
      const hoverRef = useRef(null);   // timer survol prolongé
      const flatRef = useRef([]);      // liste aplatie courante (pour le clavier)
      const selRef = useRef(0);
      const toastRef = useRef(null);

      // Référentiel de nav chargé une fois.
      useEffect(() => { NavApi.getNav().then(setNav); }, []);

      // Recherche débouncée 180 ms + token de version : on ignore toute réponse
      // qui n'est plus la dernière demandée (évite l'affichage de résultats périmés).
      useEffect(() => {
        clearTimeout(debRef.current);
        if (q.trim().length < 2) { setRecords([]); setLoading(false); return; }
        const ver = ++verRef.current;
        setLoading(true);
        debRef.current = setTimeout(() => {
          NavApi.searchRecords(q).then(res => {
            if (ver !== verRef.current) return;     // réponse périmée → ignorée
            setRecords(res || []);
            setLoading(false);
          });
        }, 180);
        return () => clearTimeout(debRef.current);
      }, [q]);

      const showToast = useCallback((msg) => {
        setToast(msg); clearTimeout(toastRef.current);
        toastRef.current = setTimeout(() => setToast(''), 1900);
      }, []);

      const openPeek = useCallback((type, id) => {
        const ver = ++peekVerRef.current;
        setPeek({ loading: true });
        NavApi.getPeek(type, id).then(data => {
          if (ver !== peekVerRef.current) return;   // peek périmé → ignoré
          if (data) setPeek({ data }); else setPeek(null);
        });
      }, []);
      const closePeek = useCallback(() => { peekVerRef.current++; setPeek(null); }, []);

      const openPalette = useCallback(() => { setOpen(true); setQ(''); setRecords([]); setSel(0); setRecents(loadRecents()); }, []);
      const closePalette = useCallback(() => { setOpen(false); setLoading(false); }, []);

      // Construit les groupes affichés + la liste aplatie (pour la navigation clavier).
      const buildGroups = () => {
        const s = q.trim().toLowerCase();
        const groups = [];
        if (!s) {
          if (recents.length) groups.push({ grp: 'Récents', icon: 'clock', items: recents.map(r => ({ ...r, kind: 'record', iconCls: 'rec', hint: 'Récent' })) });
          groups.push({ grp: 'Écrans', items: nav.ecrans.map(e => ({ id: 'ecran-' + e.id, ecranId: e.id, kind: 'ecran', icon: e.id === 'recap' ? 'star' : 'home', label: e.label, sub: e.sub, hint: 'Écran' })) });
          if (nav.actions.length) groups.push({ grp: 'Actions', items: nav.actions.map(a => ({ id: a.id, actionId: a.id, kind: 'action', icon: a.icon || 'plus', label: a.label, sub: a.sub, kbd: a.kbd })) });
          return groups;
        }
        const ec = nav.ecrans.filter(e => (e.label + ' ' + (e.sub || '')).toLowerCase().includes(s))
          .map(e => ({ id: 'ecran-' + e.id, ecranId: e.id, kind: 'ecran', icon: e.id === 'recap' ? 'star' : 'home', label: e.label, sub: e.sub, hint: 'Écran' }));
        const ac = nav.actions.filter(a => (a.label + ' ' + (a.sub || '')).toLowerCase().includes(s))
          .map(a => ({ id: a.id, actionId: a.id, kind: 'action', icon: a.icon || 'plus', label: a.label, sub: a.sub, kbd: a.kbd }));
        if (ec.length) groups.push({ grp: 'Écrans', items: ec });
        if (ac.length) groups.push({ grp: 'Actions', items: ac });
        if (records.length) groups.push({
          grp: 'Enregistrements', icon: 'star',
          items: records.map(r => ({ ...r, kind: 'record', iconCls: r.type === 'devis' ? 'art' : '', hint: ({ prospect: 'Client', affaire: 'Affaire', devis: 'Devis', interlocuteur: 'Contact' })[r.type] || r.type }))
        });
        return groups;
      };

      const runItem = useCallback((it) => {
        if (!it) return;
        if (it.kind === 'ecran') { navigateTo({ screen: it.ecranId }); closePalette(); return; }
        if (it.kind === 'action') { showToast('Action : ' + it.label); window.dispatchEvent(new CustomEvent('tw:action', { detail: { id: it.actionId } })); closePalette(); return; }
        // record
        setRecents(saveRecent({ id: it.id, type: it.type, entityId: it.entityId, icon: it.icon, label: it.label, sub: it.sub, prospectId: it.prospectId, affaireId: it.affaireId }));
        navigateTo({ prospectId: it.prospectId, type: it.type, entityId: it.entityId, affaireId: it.affaireId });
        closePalette();
      }, [closePalette, showToast]);

      // Survol prolongé (~550 ms) sur une ligne d'enregistrement → aperçu.
      const onItemEnter = (it) => { if (it.kind !== 'record') return; clearTimeout(hoverRef.current); hoverRef.current = setTimeout(() => openPeek(it.type, it.entityId), 550); };
      const onItemLeave = () => clearTimeout(hoverRef.current);

      // ---------- Raccourcis clavier globaux ----------
      useEffect(() => {
        const onKey = (e) => {
          const k = (e.key || '').toLowerCase();
          if ((e.ctrlKey || e.metaKey) && k === 'k') { e.preventDefault(); if (openRef.current) closePalette(); else openPalette(); return; }
          if (e.key === 'Escape') { if (peek) { closePeek(); return; } if (openRef.current) closePalette(); return; }
          if (!openRef.current) return;
          const flat = flatRef.current;
          if (e.key === 'ArrowDown') { e.preventDefault(); setSel(s => Math.min(s + 1, flat.length - 1)); }
          else if (e.key === 'ArrowUp') { e.preventDefault(); setSel(s => Math.max(s - 1, 0)); }
          else if (e.key === 'Enter') { e.preventDefault(); runItem(flat[selRef.current]); }
        };
        document.addEventListener('keydown', onKey);
        return () => document.removeEventListener('keydown', onKey);
      }, [openPalette, closePalette, closePeek, runItem, peek]);

      // Events publics : ouvrir la palette / ouvrir un peek (utilisés par LinkedObject & boutons).
      useEffect(() => {
        const onPal = () => openPalette();
        const onPeek = (e) => { const d = (e && e.detail) || {}; if (d.type && d.id != null) openPeek(d.type, d.id); };
        window.addEventListener('tw:palette', onPal);
        window.addEventListener('tw:peek', onPeek);
        return () => { window.removeEventListener('tw:palette', onPal); window.removeEventListener('tw:peek', onPeek); };
      }, [openPalette, openPeek]);

      // Focus de l'input + reset sélection à l'ouverture.
      useEffect(() => { if (open && inputRef.current) inputRef.current.focus(); }, [open]);
      useEffect(() => { setSel(0); }, [q, records, open]);

      // Refs miroir pour le handler clavier (évite les closures périmées).
      const openRef = useRef(false);
      openRef.current = open;
      selRef.current = sel;

      const groups = buildGroups();
      const flat = [];
      groups.forEach(g => g.items.forEach(it => flat.push(it)));
      flatRef.current = flat;

      // Scroll de l'élément sélectionné dans la vue.
      useEffect(() => {
        if (!open) return;
        const el = document.querySelector('#twnav-root .twnav-item.sel');
        if (el) el.scrollIntoView({ block: 'nearest' });
      }, [sel, open]);

      let counter = 0;
      return (
        <React.Fragment>
          {open && (
            <div className="twnav-overlay" onMouseDown={(e) => { if (e.target === e.currentTarget) closePalette(); }}>
              <div className="twnav-palette" role="dialog" aria-label="Recherche rapide">
                <div className="twnav-search">
                  <Icon name="search" size={19} />
                  <input ref={inputRef} value={q} onChange={e => setQ(e.target.value)} autoComplete="off"
                    placeholder="Écran, action, ou n° SIREN / raison sociale / devis / contact…" />
                  {loading && <div className="twnav-spin" />}
                  <span className="twnav-esc">Échap</span>
                </div>
                <div className="twnav-results">
                  {flat.length === 0
                    ? <div className="twnav-empty">{q.trim().length >= 2 ? 'Aucun résultat pour « ' + q.trim() + ' »' : 'Tape au moins 2 caractères pour rechercher'}</div>
                    : groups.map((g, gi) => (
                      <React.Fragment key={gi}>
                        <div className="twnav-group">{g.icon && <Icon name={g.icon} size={12} />}{g.grp}</div>
                        {g.items.map((it) => {
                          const idx = counter++;
                          return (
                            <div key={it.id + '-' + idx} className={'twnav-item' + (idx === sel ? ' sel' : '')}
                              onMouseMove={() => setSel(idx)} onMouseEnter={() => onItemEnter(it)} onMouseLeave={onItemLeave}
                              onClick={() => runItem(it)}>
                              <div className={'ic ' + (it.iconCls || '')}><Icon name={it.icon} size={16} /></div>
                              <div className="txt"><b>{highlight(it.label, q.trim())}</b><span>{it.sub || ''}</span></div>
                              <span className="hint">
                                {it.kbd && it.kbd.map((kk, i) => <kbd key={i}>{kk}</kbd>)}
                                {it.kind === 'record' && (
                                  <button className="twnav-eye" title="Aperçu"
                                    onClick={(e) => { e.stopPropagation(); openPeek(it.type, it.entityId); }}>
                                    <Icon name="eye" size={13} />
                                  </button>
                                )}
                                {it.hint && <span>{it.hint}</span>}
                              </span>
                            </div>
                          );
                        })}
                      </React.Fragment>
                    ))}
                </div>
                <div className="twnav-foot">
                  <span><kbd>↑</kbd><kbd>↓</kbd> naviguer</span>
                  <span><kbd>↵</kbd> ouvrir</span>
                  <span><kbd>Échap</kbd> fermer</span>
                </div>
              </div>
            </div>
          )}
          <PeekPanel peek={peek} onClose={closePeek} />
          {toast && <div className="twnav-toast show">✓ {toast}</div>}
        </React.Fragment>
      );
    }

    /* ---------- LinkedObject : composant réutilisable pour brancher les écrans (phase 2) ----------
       Rend une entité comme un lien cliquable. Clic = ouvrir la fiche ; survol prolongé
       ou clic sur l'œil = aperçu. Découplé de l'overlay via les events globaux. */
    function LinkedObject({ type, id, prospectId, children }) {
      const hov = useRef(null);
      return (
        <span className="twnav-lk" title="Ouvrir — survol pour aperçu"
          onClick={() => navigateTo({ prospectId: prospectId, type, entityId: id })}
          onMouseEnter={() => { clearTimeout(hov.current); hov.current = setTimeout(() => window.dispatchEvent(new CustomEvent('tw:peek', { detail: { type, id } })), 550); }}
          onMouseLeave={() => clearTimeout(hov.current)}>
          {children}
        </span>
      );
    }

    /* ---------- Montage du second root + API publique ---------- */
    const style = document.createElement('style'); style.textContent = CSS; document.head.appendChild(style);
    const mount = document.createElement('div'); mount.id = 'twnav-root'; document.body.appendChild(mount);
    ReactDOM.createRoot(mount).render(<Overlay />);

    // API publique pour la phase 2 (boutons "Rechercher partout", écrans branchés…).
    window.TWNav = {
      openPalette: () => window.dispatchEvent(new CustomEvent('tw:palette')),
      LinkedObject,
    };
  })();
  </script>
</body>
</html>

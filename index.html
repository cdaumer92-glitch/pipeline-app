    function RecapModal({ commercial, period, prospects, onClose, onNavigate, user, API_URL }) {
      const [recapData, setRecapData] = React.useState(null);
      const [loading, setLoading] = React.useState(true);

      React.useEffect(() => {
        const fetchRecap = async () => {
          try {
            const today = new Date();
            today.setHours(23, 59, 59, 999);
            
            // Calculer les dates de début et fin selon la période
            let startDate, endDate;
            
            if (period === 'jour') {
              startDate = new Date();
              startDate.setHours(0, 0, 0, 0);
              endDate = new Date();
              endDate.setHours(23, 59, 59, 999);
            } else if (period === 'semaine') {
              startDate = new Date();
              const day = startDate.getDay();
              const diff = startDate.getDate() - day + (day === 0 ? -6 : 1); // Lundi
              startDate.setDate(diff);
              startDate.setHours(0, 0, 0, 0);
              
              // endDate = dimanche de cette semaine
              endDate = new Date(startDate);
              endDate.setDate(startDate.getDate() + 6); // +6 jours = dimanche
              endDate.setHours(23, 59, 59, 999);
            } else { // mois
              startDate = new Date(today.getFullYear(), today.getMonth(), 1);
              startDate.setHours(0, 0, 0, 0);
              // endDate = dernier jour du mois
              endDate = new Date(today.getFullYear(), today.getMonth() + 1, 0);
              endDate.setHours(23, 59, 59, 999);
            }

            // Prospects créés dans la période
            const prospectsCreated = prospects.filter(p => {
              if (p.assigned_to !== commercial) return false;
              const createdDate = new Date(p.created_at);
              return createdDate >= startDate && createdDate <= endDate;
            });

            const suspects = prospectsCreated.filter(p => p.statut_societe === 'Suspect').length;
            const prospectsCount = prospectsCreated.filter(p => p.statut_societe === 'Prospect').length;
            const clients = prospectsCreated.filter(p => p.statut_societe === 'Client').length;

            // Devis créés dans la période
            const devisCreated = prospects.filter(p => {
              if (p.assigned_to !== commercial) return false;
              if (!p.real_status || !['En cours', 'Envoyé', 'Discussion'].includes(p.real_status)) return false;
              if (!p.status_date) return false;
              const statusDate = new Date(p.status_date);
              return statusDate >= startDate && statusDate <= endDate;
            });

            // Charger toutes les actions du commercial (en parallèle pour optimiser)
            const commercialProspects = prospects.filter(p => p.assigned_to === commercial);
            const actionsPromises = commercialProspects.map(async (prospect) => {
              try {
                const res = await fetch(`${API_URL}/prospects/${prospect.id}/next_actions`, {
                  headers: { 'Authorization': `Bearer ${user.token}` }
                });
                if (res.ok) {
                  const actions = await res.json();
                  return actions.map(action => ({
                    ...action,
                    prospect_id: prospect.id,
                    prospect_name: prospect.name
                  }));
                }
              } catch (err) {
                console.error('Erreur chargement actions:', err);
              }
              return [];
            });

            const actionsArrays = await Promise.all(actionsPromises);
            const allActions = actionsArrays.flat();

            // Actions créées dans la période ET prévues dans la période (non cochées uniquement)
            const actionsCreated = allActions.filter(a => {
              if (a.completed) return false;
              const createdDate = new Date(a.created_at);
              const plannedDate = new Date(a.planned_date);
              // L'action doit être créée dans la période ET prévue dans la période
              return (createdDate >= startDate && createdDate <= endDate) &&
                     (plannedDate >= startDate && plannedDate <= endDate);
            });

            // Actions planifiées dans la période (non encore réalisées)
            const actionsPlanned = allActions.filter(a => {
              if (a.completed) return false;
              const actionDate = new Date(a.planned_date);
              return actionDate >= startDate && actionDate <= endDate;
            });

            // Actions en retard (non cochées et date < aujourd'hui)
            // Actions en retard = date strictement AVANT aujourd'hui (pas aujourd'hui)
            const startOfToday = new Date();
            startOfToday.setHours(0, 0, 0, 0);
            const actionsLate = allActions.filter(a => {
              if (a.completed) return false;
              const actionDate = new Date(a.planned_date);
              return actionDate < startOfToday;
            });

            setRecapData({
              period,
              periodLabel: period === 'jour' ? 'du jour' : period === 'semaine' ? 'de la semaine' : 'du mois',
              startDate,
              endDate,
              prospectsCreated,
              suspects,
              prospectsCount,
              clients,
              devisCreated,
              actionsCreated,
              actionsPlanned,
              actionsLate
            });
          } catch (err) {
            console.error('Erreur récap:', err);
          }
          setLoading(false);
        };

        fetchRecap();
      }, [commercial, period, prospects]);

      if (loading) {
        return (
          <div style={{
            position: 'fixed',
            top: 0,
            left: 0,
            right: 0,
            bottom: 0,
            backgroundColor: 'rgba(0,0,0,0.5)',
            display: 'flex',
            justifyContent: 'center',
            alignItems: 'center',
            zIndex: 2000

            <div style={{
              backgroundColor: 'white',

              borderRadius: '8px',
              fontSize: '16px'
            }}>

            </div>
          </div>
        );
      }

      return (
        <div style={{

          top: 0,
          left: 0,
          right: 0,
          bottom: 0,
          backgroundColor: 'rgba(0,0,0,0.5)',
          display: 'flex',

          zIndex: 2000,

        }}>

              <div style={{fontSize: '14px', color: '#666', marginTop: '8px'}}>

                {period === 'semaine' && `Du ${recapData.startDate.toLocaleDateString('fr-FR')} au ${recapData.endDate.toLocaleDateString('fr-FR')}`}
                {period === 'mois' && new Date().toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' })}

            {/* Content */}

                      <div style={{fontSize: '14px', color: '#666', marginBottom: '10px'}}>
                        {recapData.suspects > 0 && `${recapData.suspects} Suspect(s) • `}
                        {recapData.prospectsCount > 0 && `${recapData.prospectsCount} Prospect(s) • `}
                        {recapData.clients > 0 && `${recapData.clients} Client(s)`}
                      </div>
                      <ul style={{marginTop: '10px'}}>
                        {recapData.prospectsCreated.map(p => (

                            {formatCurrency((p.real_setup_amount||p.setup_amount||0) + (p.real_monthly_amount||p.monthly_amount||0)*12 + (p.real_annual_amount||p.annual_amount||0) + (p.real_training_amount||p.training_amount||0))}

                  else if (e.key === 'Enter' && searchIndex >= 0) {
                    const p = filteredProspects[searchIndex];
                    onSelectProspect(p); setGlobalSearch(''); setShowResults(false); setSearchIndex(-1);
                    if (isDashboard) onDashboard();
                  } else if (e.key === 'Escape') { setShowResults(false); setSearchIndex(-1); }
                }}
                style={{flex:1,border:'none',outline:'none',background:'transparent',fontSize:'13px',fontFamily:'DM Sans,sans-serif',color:'var(--tw-ink)',minWidth:0}}
              />
            </div>
            {showResults && (
              <div className="tw-search-dropdown">
                {filteredProspects.length > 0 ? filteredProspects.map((p, idx) => (
                  <div key={p.id} className="tw-search-item"
                    style={{background: idx === searchIndex ? 'var(--tw-teal-light)' : 'white'}}
                    onClick={() => {
                    onSelectProspect(p); setGlobalSearch(''); setShowResults(false); setSearchIndex(-1);
                    if (isDashboard) onDashboard();
                  }}>
                    <div style={{fontWeight: '600', fontSize: '13px', color: 'var(--tw-ink)'}}>{prospectDisplayName(p)}</div>
                    <div style={{fontSize: '11px', color: 'var(--tw-muted)', marginTop: '2px'}}>

                      {p.real_status && <span style={{color: 'var(--tw-slate)'}}> · {p.real_status}</span>}
                    </div>
                  </div>
                )) : (
                  <div style={{padding: '16px', textAlign: 'center', color: 'var(--tw-muted)', fontSize: '13px'}}>Aucune société trouvée</div>
                )}
              </div>
            )}
          </div>

          {/* RECHERCHE GLOBALE (palette Ctrl+K) — multi-entités : sociétés, devis, affaires, contacts.
              Distincte de la recherche "société" ci-dessus. Émet tw:palette (l'overlay écoute). */}
          <button
            onClick={() => window.dispatchEvent(new CustomEvent('tw:palette'))}
            title="Rechercher partout (Ctrl+K) — sociétés, devis, affaires, contacts"

            onMouseEnter={(e)=>{e.currentTarget.style.borderColor='#12a0dc';e.currentTarget.style.color='#12a0dc';}}
            onMouseLeave={(e)=>{e.currentTarget.style.borderColor='var(--tw-border)';e.currentTarget.style.color='var(--tw-slate)';}}
          >
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
            Rechercher partout
            <kbd style={{fontFamily:'DM Sans,sans-serif',fontSize:'10px',fontWeight:600,background:'white',border:'0.5px solid var(--tw-border)',borderRadius:'4px',padding:'1px 5px',color:'var(--tw-slate)'}}>Ctrl K</kbd>
          </button>

          {/* CTA NOUVELLE SOCIÉTÉ — bouton primaire noir style Vercel/Stripe */}
          <button
            onClick={onNewProspect}
            style={{background:'var(--tw-ink)',color:'white',border:'none',padding:'7px 13px',borderRadius:'8px',fontSize:'13px',fontWeight:500,fontFamily:'DM Sans,sans-serif',cursor:'pointer',display:'flex',alignItems:'center',gap:'6px',whiteSpace:'nowrap'}}
            onMouseEnter={(e) => e.currentTarget.style.background = '#0d2424'}
            onMouseLeave={(e) => e.currentTarget.style.background = 'var(--tw-ink)'}
          >
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 5v14M5 12h14"/></svg>
            Nouveau prospect
          </button>

          {/* PARAMÈTRES (icône discrète) */}
          {isAdmin && (
            <button
              onClick={onSettings}
              title="Paramètres"
              aria-label="Paramètres"
              style={{width:'32px',height:'32px',borderRadius:'8px',background:'transparent',border:'0.5px solid var(--tw-border)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--tw-slate)',transition:'all .15s'}}
              onMouseEnter={(e) => { e.currentTarget.style.background='var(--tw-bg)'; e.currentTarget.style.color='var(--tw-ink)'; }}
              onMouseLeave={(e) => { e.currentTarget.style.background='transparent'; e.currentTarget.style.color='var(--tw-slate)'; }}
            >
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>

          {/* USER AVATAR + DÉCONNEXION */}
          <div style={{display:'flex',alignItems:'center',gap:'8px',padding:'4px 4px 4px 10px',background:'var(--tw-bg)',borderRadius:'20px'}}>
            <span style={{fontSize:'13px',color:'var(--tw-ink)',fontWeight:500,whiteSpace:'nowrap'}}>{user.name}</span>
            <div style={{width:'28px',height:'28px',borderRadius:'50%',background:avatarColor.bg,color:avatarColor.fg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:600,fontFamily:'DM Sans,sans-serif'}}>{initials(user.name)}</div>
          </div>
          <button
            onClick={onLogout}
            title="Déconnexion"
            aria-label="Déconnexion"
            style={{width:'32px',height:'32px',borderRadius:'8px',background:'transparent',border:'0.5px solid var(--tw-border)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--tw-slate)',transition:'all .15s'}}
            onMouseEnter={(e) => { e.currentTarget.style.background='#fef2f2'; e.currentTarget.style.color='var(--tw-red)'; e.currentTarget.style.borderColor='#fecaca'; }}
            onMouseLeave={(e) => { e.currentTarget.style.background='transparent'; e.currentTarget.style.color='var(--tw-slate)'; e.currentTarget.style.borderColor='var(--tw-border)'; }}
          >
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>

    // ══════════════════════════════════════════════════
    // COMPOSANT : AttributionView
    // ══════════════════════════════════════════════════
    function AttributionView({ prospects, users, user, API_URL, onClose, onUpdateProspect }) {
      const nonAttribues = prospects.filter(p => !p.assigned_to || p.assigned_to === '');
      const commerciaux = (users||[]).filter(u => !['Frédéric','Frederic'].includes(u.name));

      // State : map id -> commercial sélectionné
      const [selections, setSelections] = React.useState(() => {
        const m = {};
        nonAttribues.forEach(p => { m[p.id] = ''; });
        return m;
      });
      const [sending, setSending] = React.useState(false);
      const [result, setResult] = React.useState(null);

      const handleSelectAll = (commercialName) => {
        const m = {};
        nonAttribues.forEach(p => { m[p.id] = commercialName; });
        setSelections(m);
      };

      const handleSend = async () => {
        const toSend = nonAttribues.filter(p => selections[p.id]);
        if (toSend.length === 0) return;
        setSending(true);
        setResult(null);
        try {
          const attributions = toSend.map(p => ({ id: p.id, commercial_name: selections[p.id] }));
          const res = await fetch(`${API_URL}/attributions/bulk`, {
            method: 'PUT',
            headers: {'Content-Type':'application/json','Authorization':`Bearer ${user.token}`},
            body: JSON.stringify({ attributions })
          });
          if (!res.ok) throw new Error('Erreur serveur');
          toSend.forEach(p => onUpdateProspect({...p, assigned_to: selections[p.id]}));
          setResult({ ok: toSend.length, errors: [] });
        } catch(e) {
          setResult({ ok: 0, errors: toSend.map(p => p.name) });
        }
        setSending(false);
      };

      const nbSelectionnes = nonAttribues.filter(p => selections[p.id]).length;

      return (
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.45)',zIndex:500,display:'flex',alignItems:'flex-start',justifyContent:'center',paddingTop:'60px'}}>
          <div style={{background:'white',borderRadius:'12px',width:'860px',maxWidth:'95vw',maxHeight:'85vh',display:'flex',flexDirection:'column',boxShadow:'0 8px 40px rgba(0,0,0,.18)',overflow:'hidden'}}>

            {/* Header */}
            <div style={{padding:'20px 24px',borderBottom:'1px solid var(--tw-border)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
              <div>
                <div style={{fontSize:'17px',fontWeight:'700',color:'var(--tw-ink)'}}>🎯 Attribution des sociétés</div>
                <div style={{fontSize:'13px',color:'var(--tw-muted)',marginTop:'3px'}}>{nonAttribues.length} société{nonAttribues.length>1?'s':''} non attribuée{nonAttribues.length>1?'s':''}</div>
              </div>
              <button onClick={onClose} style={{background:'none',border:'none',fontSize:'20px',cursor:'pointer',color:'var(--tw-muted)',lineHeight:1}}>✕</button>
            </div>

            {/* Attribution en masse */}
            {nonAttribues.length > 0 && (
              <div style={{padding:'12px 24px',borderBottom:'1px solid var(--tw-border)',background:'var(--tw-bg)',display:'flex',alignItems:'center',gap:'10px',flexShrink:0,flexWrap:'wrap'}}>
                <span style={{fontSize:'12px',color:'var(--tw-muted)',fontWeight:'600',textTransform:'uppercase',letterSpacing:'.4px'}}>Attribuer tout à :</span>
                {commerciaux.map(c => (
                  <button key={c.id} onClick={() => handleSelectAll(c.name)}
                    style={{padding:'5px 14px',background:'var(--tw-teal-light)',color:'var(--tw-teal)',border:'1px solid var(--tw-border)',borderRadius:'20px',fontSize:'12px',fontWeight:'600',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>
                    {c.name}
                  </button>
                ))}
                <button onClick={() => handleSelectAll('')}
                  style={{padding:'5px 14px',background:'white',color:'var(--tw-muted)',border:'1px solid var(--tw-border)',borderRadius:'20px',fontSize:'12px',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>
                  Réinitialiser
                </button>
              </div>
            )}

            {/* Liste */}
            <div style={{flex:1,overflowY:'auto',padding:'0 24px'}}>
              {nonAttribues.length === 0 ? (
                <div style={{padding:'40px',textAlign:'center',color:'var(--tw-muted)',fontSize:'14px'}}>✅ Toutes les sociétés sont attribuées</div>
              ) : (
                <table style={{width:'100%',borderCollapse:'collapse'}}>
                  <thead>
                    <tr style={{borderBottom:'2px solid var(--tw-border)'}}>
                      <th style={{padding:'12px 8px',textAlign:'left',fontSize:'11px',fontWeight:'700',color:'var(--tw-muted)',textTransform:'uppercase',letterSpacing:'.4px'}}>Société</th>
                      <th style={{padding:'12px 8px',textAlign:'left',fontSize:'11px',fontWeight:'700',color:'var(--tw-muted)',textTransform:'uppercase',letterSpacing:'.4px'}}>Type</th>
                      <th style={{padding:'12px 8px',textAlign:'left',fontSize:'11px',fontWeight:'700',color:'var(--tw-muted)',textTransform:'uppercase',letterSpacing:'.4px'}}>Ville</th>
                      <th style={{padding:'12px 8px',textAlign:'left',fontSize:'11px',fontWeight:'700',color:'var(--tw-muted)',textTransform:'uppercase',letterSpacing:'.4px'}}>Commercial</th>
                    </tr>
                  </thead>
                  <tbody>
                    {nonAttribues.map((p, idx) => (
                      <tr key={p.id} style={{borderBottom:'1px solid var(--tw-border)',background:idx%2===0?'white':'var(--tw-bg)'}}>
                        <td style={{padding:'10px 8px',fontSize:'13px',fontWeight:'600',color:'var(--tw-ink)'}}>
                          <div>{prospectDisplayName(p)}</div>
                          {(() => {
                            // Téléphone affiché sous le nom pour éviter d'attribuer une société "muette".
                            // Sociétés sans tél = orange + libellé explicite, pour les repérer d'un coup d'œil.
                            const tel = p.tel_standard || p.phone;
                            return tel
                              ? <div style={{fontSize:'12px',fontWeight:'500',color:'var(--tw-slate)',marginTop:'2px'}}>☎ {tel}</div>
                              : <div style={{fontSize:'11px',fontWeight:'600',color:'var(--tw-orange)',marginTop:'2px'}}>☎ pas de téléphone</div>;
                          })()}
                        </td>
                        <td style={{padding:'10px 8px'}}>
                          <span style={{fontSize:'11px',fontWeight:'600',padding:'2px 8px',borderRadius:'10px',
                            background:p.statut_societe==='Client'?'var(--tw-teal-light)':p.statut_societe==='Prospect'?'#fff8e1':'#f5f5f5',
                            color:p.statut_societe==='Client'?'var(--tw-teal)':p.statut_societe==='Prospect'?'#f57c00':'#999'}}>
                            {p.statut_societe||'Prospect'}
                          </span>
                        </td>
                        <td style={{padding:'10px 8px',fontSize:'13px',color:'var(--tw-slate)'}}>{p.ville||'—'}</td>
                        <td style={{padding:'10px 8px'}}>
                          <select value={selections[p.id]||''} onChange={e => setSelections(s => ({...s,[p.id]:e.target.value}))}
                            style={{padding:'5px 8px',border:'1px solid var(--tw-border)',borderRadius:'6px',fontSize:'12px',fontFamily:"'DM Sans',sans-serif",background:'white',minWidth:'130px',
                              borderColor:selections[p.id]?'var(--tw-teal)':'var(--tw-border)',
                              color:selections[p.id]?'var(--tw-teal)':'var(--tw-muted)'}}>
                            <option value="">— Choisir —</option>
                            {commerciaux.map(c => (
                              <option key={c.id} value={c.name}>{c.name}</option>
                            ))}
                          </select>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>

            {/* Footer */}
            {nonAttribues.length > 0 && (
              <div style={{padding:'16px 24px',borderTop:'1px solid var(--tw-border)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0,background:'white'}}>
                <div style={{fontSize:'13px',color:'var(--tw-muted)'}}>
                  {nbSelectionnes > 0
                    ? <span style={{color:'var(--tw-teal)',fontWeight:'600'}}>{nbSelectionnes} société{nbSelectionnes>1?'s':''} sélectionnée{nbSelectionnes>1?'s':''}</span>
                    : 'Aucune société sélectionnée'}
                </div>
                <div style={{display:'flex',gap:'10px',alignItems:'center'}}>
                  {result && (
                    <span style={{fontSize:'12px',fontWeight:'500',color:result.errors.length===0?'var(--tw-green)':'var(--tw-orange)'}}>
                      ✅ {result.ok} attribuée{result.ok>1?'s':''}
                      {result.errors.length>0 && ` · ⚠ ${result.errors.length} erreur(s)`}
                    </span>
                  )}
                  <button onClick={onClose} style={{padding:'8px 18px',background:'white',color:'var(--tw-slate)',border:'1px solid var(--tw-border)',borderRadius:'6px',fontSize:'13px',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>
                    Fermer
                  </button>
                  <button onClick={handleSend} disabled={sending || nbSelectionnes === 0}
                    style={{padding:'8px 20px',background:(sending||nbSelectionnes===0)?'#ccc':'var(--tw-teal)',color:'white',border:'none',borderRadius:'6px',fontSize:'13px',fontWeight:'600',cursor:(sending||nbSelectionnes===0)?'default':'pointer',fontFamily:"'DM Sans',sans-serif"}}>
                    {sending ? '⏳ Envoi...' : `🎯 Attribuer & envoyer les mails (${nbSelectionnes})`}
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function Settings({ onClose, user }) {
      const [users, setUsers] = React.useState([]);
      const [newUserEmail, setNewUserEmail] = React.useState('');
      const [newUserPassword, setNewUserPassword] = React.useState('');
      const [newUserName, setNewUserName] = React.useState('');
      const [editingUserId, setEditingUserId] = React.useState(null);
      const [newPassword, setNewPassword] = React.useState('');
      const [showNewPassword, setShowNewPassword] = React.useState(false);
      const [showPassword, setShowPassword] = React.useState({});
      const [showTempPassword, setShowTempPassword] = React.useState({});

      React.useEffect(() => {
        fetchUsers();
      }, []);

      const fetchUsers = async () => {
        try {
          const res = await fetch(`${API_URL}/users`, {
            headers: { 'Authorization': `Bearer ${user.token}` }
          });
          if (res.ok) {
            const data = await res.json();
            setUsers(data);
          }
        } catch (err) {
          console.error('Erreur:', err);
        }
      };

      const handleCreateUser = async () => {
        if (!newUserEmail || !newUserPassword || !newUserName) {
          window.showToast({title:'Remplissez tous les champs', type:'warning'});
          return;
        }
        try {
          const res = await fetch(`${API_URL}/users`, {
            method: 'POST',
            headers: { 
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${user.token}`
            },
            body: JSON.stringify({ email: newUserEmail, password: newUserPassword, name: newUserName })
          });
          if (res.ok) {
            setNewUserEmail('');
            setNewUserPassword('');
            setNewUserName('');
            fetchUsers();
          } else {
            window.showToast({title:'Erreur: ' + (await res.text()), type:'error'});
          }
        } catch (err) {
          window.showToast({title:'Erreur: ' + err.message, type:'error'});
        }
      };

      const handleChangePassword = async (userId) => {
        if (!newPassword) {
          window.showToast({title:'Entrez un nouveau mot de passe', type:'info'});
          return;
        }
        try {
          const res = await fetch(`${API_URL}/users/${userId}/password`, {
            method: 'PUT',
            headers: { 
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${user.token}`
            },
            body: JSON.stringify({ password: newPassword })
          });
          if (res.ok) {
            setEditingUserId(null);
            setNewPassword('');
            fetchUsers();
            window.showToast({title:'Mot de passe modifié', type:'success'});
          } else {
            window.showToast({title:'Erreur: ' + (await res.text()), type:'error'});
          }
        } catch (err) {
          window.showToast({title:'Erreur: ' + err.message, type:'error'});
        }
      };

      const handleDeleteUser = async (userId, userName) => {
        if (window.confirm(`Êtes-vous sûr de vouloir supprimer ${userName} ?`)) {
          try {
            const res = await fetch(`${API_URL}/users/${userId}`, {
              method: 'DELETE',
              headers: { 
                'Authorization': `Bearer ${user.token}`
              }
            });
            if (res.ok) {
              fetchUsers();
              window.showToast({title:'Utilisateur supprimé', type:'success'});
            } else {
              window.showToast({title:'Erreur: ' + (await res.text()), type:'error'});
            }
          } catch (err) {
            window.showToast({title:'Erreur: ' + err.message, type:'error'});
          }
        }
      };

      return (
        <div style={{position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, backgroundColor: 'rgba(0,0,0,0.5)', display: 'flex', justifyContent: 'center', alignItems: 'center', zIndex: 1000}}>
          <div style={{backgroundColor: 'white', borderRadius: '8px', padding: '30px', maxWidth: '600px', width: '90%', maxHeight: '90vh', overflowY: 'auto'}}>
            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px'}}>
              <h2 style={{margin: 0}}>Gestion des comptes</h2>
              <button onClick={onClose} style={{backgroundColor: '#ccc', border: 'none', borderRadius: '4px', padding: '8px 12px', cursor: 'pointer', fontSize: '16px'}}>✕</button>
            </div>

            {/* Créer un nouvel utilisateur */}
            <div style={{backgroundColor: '#f9f9f9', padding: '15px', borderRadius: '8px', marginBottom: '20px'}}>
              <h3>Créer un nouveau compte</h3>
              <input
                type="email"
                placeholder="Email"
                value={newUserEmail}
                onChange={(e) => setNewUserEmail(e.target.value)}
                style={{width: '100%', padding: '10px', marginBottom: '10px', border: '1px solid #ddd', borderRadius: '4px', boxSizing: 'border-box'}}
              />
              <input
                type="text"
                placeholder="Nom complet"
                value={newUserName}
                onChange={(e) => setNewUserName(e.target.value)}
                style={{width: '100%', padding: '10px', marginBottom: '10px', border: '1px solid #ddd', borderRadius: '4px', boxSizing: 'border-box'}}
              />
              <div style={{display: 'flex', gap: '10px', alignItems: 'center', marginBottom: '10px'}}>
                <input
                  type={showNewPassword ? "text" : "password"}
                  placeholder="Mot de passe"
                  value={newUserPassword}
                  onChange={(e) => setNewUserPassword(e.target.value)}
                  style={{flex: 1, padding: '10px', border: '1px solid #ddd', borderRadius: '4px', boxSizing: 'border-box'}}
                />
                <input
                  type="checkbox"
                  checked={showNewPassword}
                  onChange={(e) => setShowNewPassword(e.target.checked)}
                  style={{cursor: 'pointer'}}
                  title="Afficher le mot de passe"
                />
              </div>
              <button onClick={handleCreateUser} style={{backgroundColor: '#10a0dc', color: 'white', border: 'none', padding: '10px 20px', borderRadius: '4px', cursor: 'pointer', fontWeight: 'bold'}}>Créer</button>
            </div>

            {/* Liste des utilisateurs */}
            <div>
              <h3>Utilisateurs existants</h3>
              {users.map(u => (
                <div key={u.id} style={{backgroundColor: '#f9f9f9', padding: '15px', borderRadius: '8px', marginBottom: '10px'}}>
                  <div style={{marginBottom: '10px'}}>
                    <strong>{u.name}</strong> ({u.email})
                  </div>
                  {u.temp_password && (

    function SuspectsNonAttribuesPanel({ API_URL, token }) {
      const [loading, setLoading] = React.useState(false);
      const [msg, setMsg] = React.useState(null);
      const [isError, setIsError] = React.useState(false);

      const handleDelete = async () => {
        setMsg(null);
        setIsError(false);
        setLoading(true);
        try {
          // 1. Compter d'abord
          const countRes = await fetch(API_URL + '/societes/suspects-non-attribues/count', {
            headers: { Authorization: 'Bearer ' + token }
          });
          const countData = await countRes.json();
          if (!countRes.ok) throw new Error(countData.error || 'Erreur serveur');
          const count = countData.count;

          if (count === 0) {
            setMsg('Aucune société suspect non attribuée trouvée.');
            setLoading(false);
            return;
          }

          // 2. Demander confirmation
          const confirmed = window.confirm(
            `${count} société${count > 1 ? 's' : ''} suspect${count > 1 ? 's' : ''} non attribuée${count > 1 ? 's' : ''} vont être supprimée${count > 1 ? 's' : ''} définitivement.\n\nCette action est irréversible. Confirmer ?`
          );
          if (!confirmed) {
            setLoading(false);
            return;
          }

          // 3. Supprimer
          const delRes = await fetch(API_URL + '/societes/suspects-non-attribues', {
            method: 'DELETE',
            headers: { Authorization: 'Bearer ' + token }
          });
          const delData = await delRes.json();
          if (!delRes.ok) throw new Error(delData.error || 'Erreur serveur');
          setMsg(`✅ ${delData.deleted} société${delData.deleted > 1 ? 's' : ''} supprimée${delData.deleted > 1 ? 's' : ''}.`);
        } catch (e) {
          setIsError(true);
          setMsg('❌ ' + e.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div style={{marginBottom:'18px',background:'white',border:'1px solid var(--tw-border)',borderRadius:'10px',boxShadow:'0 1px 3px rgba(0,125,137,.06)',overflow:'hidden'}}>
          <div style={{padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span style={{fontSize:'13px',fontWeight:'600',color:'#c0392b'}}>🗑️ Gestion des suspects non attribués</span>
            <button
              onClick={handleDelete}
              disabled={loading}
              style={{padding:'7px 16px',background:loading?'#ccc':'#e74c3c',color:'white',border:'none',borderRadius:'6px',fontSize:'12px',fontWeight:'600',cursor:loading?'default':'pointer',fontFamily:"'DM Sans',sans-serif",whiteSpace:'nowrap'}}
            >
              {loading ? '⏳ Vérification...' : '🗑️ Supprimer les suspects non attribués'}
            </button>
          </div>
          {msg && (
            <div style={{padding:'8px 16px 12px',borderTop:'1px solid var(--tw-border)'}}>
              <div style={{fontSize:'13px',fontWeight:'500',color:isError?'#c0392b':'#2e7d32',background:isError?'#fdecea':'#e8f8f0',border:`1px solid ${isError?'#f5c6c2':'#a8dfc0'}`,borderRadius:'6px',padding:'8px 12px'}}>
                {msg}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ══════════════════════════════════════════════════
    // COMPOSANT : ImportPanel
    // ══════════════════════════════════════════════════
    function ImportPanel({ API_URL, token }) {
      const [open, setOpen] = React.useState(false);
      const [file, setFile] = React.useState(null);
      const [loading, setLoading] = React.useState(false);
      const [result, setResult] = React.useState(null);
      const [error, setError] = React.useState(null);
      const fileRef = React.useRef();

      const handleImport = async () => {
        if (!file) return;
        setLoading(true);
        setResult(null);
        setError(null);
        try {
          const formData = new FormData();
          formData.append('file', file);
          const res = await fetch(API_URL + '/import', {
            method: 'POST',
            headers: { Authorization: 'Bearer ' + token },
            body: formData
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Erreur serveur');
          setResult(data);
          setFile(null);
          if (fileRef.current) fileRef.current.value = '';
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div style={{marginBottom:'18px',background:'white',border:'1px solid var(--tw-border)',borderRadius:'10px',boxShadow:'0 1px 3px rgba(0,125,137,.06)',overflow:'hidden'}}>
          <div onClick={() => setOpen(o => !o)}
            style={{padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer',userSelect:'none'}}
            onMouseEnter={e=>e.currentTarget.style.background='var(--tw-teal-light)'}
            onMouseLeave={e=>e.currentTarget.style.background='white'}
          >
            <span style={{fontSize:'13px',fontWeight:'600',color:'var(--tw-teal)'}}>📥 Import Excel — Sociétés & Contacts</span>
            <span style={{fontSize:'12px',color:'var(--tw-muted)'}}>{open ? '▲ Fermer' : '▼ Ouvrir'}</span>
          </div>
          {open && (
            <div style={{padding:'0 16px 16px',borderTop:'1px solid var(--tw-border)'}}>
              <div style={{marginTop:'14px',display:'flex',flexDirection:'column',gap:'12px'}}>

                {/* Info template */}
                <div style={{background:'var(--tw-teal-light)',border:'1px solid var(--tw-border)',borderRadius:'6px',padding:'10px 14px',fontSize:'12px',color:'var(--tw-teal)',lineHeight:'1.6'}}>
                  <b>Format attendu :</b> fichier Excel avec 2 onglets <b>Societes</b> et <b>Contacts</b>.<br/>
                  Colonnes Societes : <i>nom_societe*, statut*, adresse, cp, ville, pays, telephone, email_societe, site_web, secteur, notes</i><br/>
                  Colonnes Contacts : <i>nom_societe*, civilite, prenom, nom*, fonction, telephone, email, contact_principal</i><br/>
                  Statut accepté : <b>Suspect / Prospect / Client</b> — Les doublons sont mis à jour. Les sociétés importées sont <b>non attribuées</b>.
                </div>

                {/* Sélecteur fichier */}
                <div style={{display:'flex',gap:'10px',alignItems:'center',flexWrap:'wrap'}}>
                  <input ref={fileRef} type="file" accept=".xlsx,.xls"
                    onChange={e => { setFile(e.target.files[0]); setResult(null); setError(null); }}
                    style={{fontSize:'13px',color:'var(--tw-ink)',flex:1,minWidth:'200px'}}
                  />
                  <button onClick={handleImport} disabled={!file || loading}
                    style={{padding:'8px 18px',background:(!file||loading)?'#ccc':'var(--tw-teal)',color:'white',border:'none',borderRadius:'6px',fontSize:'13px',fontWeight:'600',cursor:(!file||loading)?'default':'pointer',fontFamily:"'DM Sans',sans-serif",whiteSpace:'nowrap'}}>
                    {loading ? '⏳ Import...' : '📥 Importer'}
                  </button>
                </div>

                {/* Résultat */}
                {result && (
                  <div style={{background:'#e8f8f0',border:'1px solid #a8dfc0',borderRadius:'6px',padding:'12px 14px',fontSize:'13px',lineHeight:'1.8'}}>
                    <div style={{fontWeight:'700',color:'#2e7d32',marginBottom:'4px'}}>✅ Import terminé</div>
                    <div>🏢 Sociétés créées : <b>{result.created}</b></div>
                    <div>🔄 Sociétés mises à jour : <b>{result.updated}</b></div>
                    <div>👤 Contacts ajoutés : <b>{result.contactsAdded}</b></div>
                    {result.errors && result.errors.length > 0 && (
                      <div style={{marginTop:'8px',color:'#c0392b'}}>
                        <b>⚠ {result.errors.length} erreur(s) :</b>
                        <ul style={{margin:'4px 0 0 16px',fontSize:'12px'}}>
                          {result.errors.slice(0,5).map((e,i) => <li key={i}>{e}</li>)}
                          {result.errors.length > 5 && <li>...et {result.errors.length-5} autres</li>}
                        </ul>
                      </div>
                    )}
                    <div style={{marginTop:'8px',fontSize:'12px',color:'var(--tw-slate)'}}>Rechargez la page pour voir les nouvelles sociétés.</div>
                  </div>
                )}
                {error && (
                  <div style={{background:'#fdecea',border:'1px solid #f5c6c2',borderRadius:'6px',padding:'10px 14px',fontSize:'13px',color:'var(--tw-red)'}}>
                    ❌ {error}
                  </div>
                )}

              </div>
            </div>
          )}
        </div>
      );
    }

    function LeftPanel({ prospects, allProspects, selectedProspect, onSelect, filterSocietyType, onFilterSocietyTypeChange, filterStatus, onFilterChange, filterCommercial, onFilterCommercialChange, searchTerm, onSearchChange, sortBy, onSortChange, prospectActionsInfo, onNewProspect, isAdmin, filterAttribution, onFilterAttributionChange, currentUser }) {
      // ================================================================
      // === PALETTE ANTHRACITE / COCKPIT (LeftPanel uniquement) ===
      // ================================================================
      const A = {
        bg:        '#2d3540',  // fond panel
        bgSoft:    '#363f4d',  // fond items
        bgHover:   '#3d4856',  // hover
        bgActive:  '#454f60',  // item sélectionné
        border:    '#3d4856',  // bordures internes
        text:      '#ffffff',  // texte principal
        textDim:   '#aab4c2',  // texte secondaire
        textMuted: '#7a8595',  // texte étiquettes
        teal:      '#5DCAA5',  // accent vert (KPI gain, signé)
        blue:      '#85B7EB',  // accent bleu (info, en cours)
        amber:     '#EFC274',  // accent ambre (devis, attention)
        red:       '#F09595',  // accent rouge (perdu, retard)
      };

      // État local : panneau dépliable du multi-select Statut (hooks au niveau composant, pas dans IIFE)
      const [statusMenuOpen, setStatusMenuOpen] = React.useState(false);

      // === KPIs calculés depuis les données réelles ===
      const today = new Date(); today.setHours(0,0,0,0);
      const pipelineActif = prospects.filter(p => p.real_status && ['En cours','Envoyé','Discussion'].includes(p.real_status));
      const aboMensuel = pipelineActif.reduce((s,p) => s + (parseFloat(p.real_monthly_amount || p.monthly_amount) || 0), 0);
      const aboPondere = pipelineActif.reduce((s,p) => s + (parseFloat(p.real_monthly_amount || p.monthly_amount) || 0) * ((p.real_probability||0)/100), 0);
      const nbActifs = pipelineActif.length;
      const nbRetard = Object.values(prospectActionsInfo || {}).filter(a => a && a.isLate).length;

      // === Mini sparkline : répartition par statut de devis ===
      // (5 valeurs réelles côté DB : En cours / Envoyé / Discussion / Gagné / Perdu)
      const statusCounts = {
        'En cours':   prospects.filter(p => p.real_status === 'En cours').length,
        'Envoyé':     prospects.filter(p => p.real_status === 'Envoyé').length,
        'Discussion': prospects.filter(p => p.real_status === 'Discussion').length,
        'Gagné':      prospects.filter(p => p.real_status === 'Gagné').length,
      };
      const maxCount = Math.max(1, ...Object.values(statusCounts));

      // === Format des montants (compact) ===
      const fmtK = (n) => {
        if (n >= 1000) return (n/1000).toFixed(1).replace('.0','') + ' K€';
        return Math.round(n) + ' €';
      };

      // === Style des selects (adapté au fond sombre) ===
      const selectStyle = {
        width:'100%', padding:'7px 10px', fontSize:'12px', border:'0.5px solid '+A.border,
        borderRadius:'7px', background:A.bgSoft, color:A.text, cursor:'pointer',
        fontFamily:"'DM Sans',sans-serif", appearance:'none',
        backgroundImage:'url("data:image/svg+xml;utf8,<svg xmlns=%27http://www.w3.org/2000/svg%27 width=%2710%27 height=%2710%27 viewBox=%270 0 24 24%27 fill=%27none%27 stroke=%27%23aab4c2%27 stroke-width=%272%27><polyline points=%276 9 12 15 18 9%27/></svg>")',
        backgroundRepeat:'no-repeat', backgroundPosition:'right 10px center', paddingRight:'28px'
      };
      const labelStyle = {fontSize:'10px',fontWeight:500,color:A.textMuted,marginBottom:'5px',display:'block',textTransform:'uppercase',letterSpacing:'.5px'};

      return (
        <div className="tw-dark-scroll" style={{...styles.leftPanel, background:A.bg, borderRight:'0.5px solid '+A.border}}>

          {/* === KPIs cockpit === */}
          <div style={{padding:'14px 14px 0'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'8px'}}>
              <div style={{background:A.bgSoft,borderRadius:'8px',padding:'10px 12px'}}>
                <div style={{fontSize:'9px',color:A.textMuted,textTransform:'uppercase',letterSpacing:'.5px',fontWeight:500,marginBottom:'4px'}}>Pipeline</div>
                <div style={{fontSize:'17px',fontWeight:600,color:A.teal,fontVariantNumeric:'tabular-nums',letterSpacing:'-.3px'}}>{fmtK(aboMensuel)}</div>
                <div style={{fontSize:'10px',color:A.textDim,marginTop:'2px'}}>pondéré : {fmtK(aboPondere)}</div>
              </div>
              <div style={{background:A.bgSoft,borderRadius:'8px',padding:'10px 12px'}}>
                <div style={{fontSize:'9px',color:A.textMuted,textTransform:'uppercase',letterSpacing:'.5px',fontWeight:500,marginBottom:'4px'}}>Actifs</div>
                <div style={{fontSize:'17px',fontWeight:600,color:A.blue,fontVariantNumeric:'tabular-nums'}}>{nbActifs}</div>
                <div style={{fontSize:'10px',color: nbRetard > 0 ? A.red : A.textDim,marginTop:'2px'}}>{nbRetard > 0 ? `${nbRetard} en retard` : 'à jour'}</div>
              </div>
            </div>

            {/* Mini-graph : répartition par statut */}
            <div style={{background:A.bgSoft,borderRadius:'8px',padding:'10px 12px',marginBottom:'10px'}}>
              <div style={{fontSize:'9px',color:A.textMuted,textTransform:'uppercase',letterSpacing:'.5px',fontWeight:500,marginBottom:'6px'}}>Répartition</div>
              <div style={{display:'flex',gap:'6px',alignItems:'flex-end',height:'32px'}}>
                {Object.entries(statusCounts).map(([k, v], idx) => {
                  const pct = (v / maxCount) * 100;
                  const colors = [A.amber, A.amber, A.blue, A.teal];
                  return (
                    <div key={k} style={{flex:1,height:`${Math.max(4,pct)}%`,background:colors[idx],borderRadius:'2px 2px 0 0',transition:'height .3s',opacity: v === 0 ? 0.3 : 1}}></div>
                  );
                })}
              </div>
              <div style={{display:'flex',gap:'6px',marginTop:'4px'}}>
                {Object.entries(statusCounts).map(([k, v]) => (
                  <div key={k} style={{flex:1,textAlign:'center',fontSize:'9px',color:A.textDim}}>
                    <div style={{color:A.text,fontWeight:500,fontSize:'10px',fontVariantNumeric:'tabular-nums'}}>{v}</div>
                    <div>{k}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* === Toggle Attribution === */}
          {isAdmin && (
            <div style={{margin:'4px 14px 0',display:'flex',background:A.bgSoft,border:'0.5px solid '+A.border,borderRadius:'7px',padding:'2px',gap:'2px'}}>
              {[
                {id:'Toutes', label:'Toutes'},
                {id:'Mes', label:'Mes sociétés'},
                {id:'NonAttribuees', label:'Non attr.'},
              ].map(opt => (
                <button key={opt.id} onClick={() => onFilterAttributionChange(opt.id)}
                  style={{flex:1,padding:'5px 4px',border:'none',borderRadius:'5px',fontSize:'10px',fontWeight: filterAttribution===opt.id ? 600 : 500,
                    background: filterAttribution===opt.id ? A.bgActive : 'transparent',
                    color: filterAttribution===opt.id ? A.text : A.textDim,
                    cursor:'pointer',transition:'all .15s',fontFamily:"'DM Sans',sans-serif",whiteSpace:'nowrap'}}>
                  {opt.label}
                </button>
              ))}
            </div>
          )}

          {/* === Filtres === */}
          <div style={{padding:'10px 14px 0'}}>
            <label style={labelStyle}>Type</label>
            <select value={filterSocietyType} onChange={(e) => onFilterSocietyTypeChange(e.target.value)} style={selectStyle}>
              {['Tous', 'Suspect', 'Prospect', 'Client'].map(type => {
                const count = type === 'Tous' ? allProspects.length : allProspects.filter(p => p.statut_societe === type).length;
                const label = type + (type === 'Suspect' || type === 'Prospect' || type === 'Client' ? 's' : '');
                return <option key={type} value={type}>{label} ({count})</option>;
              })}
            </select>
          </div>

          <div style={{padding:'10px 14px 0'}}>
            <label style={labelStyle}>Statut</label>
            {/* Multi-select : bouton résumé + panneau de checkboxes dépliable.
                filterStatus = tableau de statuts cochés. Tableau vide = "Tous".
                Préset "Devis en cours" disponible en haut pour cocher rapidement les 4 statuts d'un devis actif.
                statusMenuOpen est défini au niveau de LeftPanel (hooks ne peuvent pas être dans une IIFE). */}
            {(() => {
              const ALL_STATUS = ['Prospection', 'En cours', 'Envoyé', 'Discussion', 'Démo', 'Négociation', 'Gagné', 'Ajourné N+1', 'Éliminé par nous', 'Perdu'];
              const DEVIS_EN_COURS = ['En cours', 'Envoyé', 'Discussion', 'Négociation'];

              const selected = Array.isArray(filterStatus) ? filterStatus : [];
              const isAllSelected = selected.length === 0;
              const isDevisEnCours = selected.length === DEVIS_EN_COURS.length && DEVIS_EN_COURS.every(s => selected.includes(s));

              // Label affiché sur le bouton
              let label;
              if (isAllSelected) label = 'Tous';
              else if (isDevisEnCours) label = 'Devis en cours';
              else if (selected.length === 1) label = selected[0];
              else label = `${selected.length} statuts`;

              const toggleStatus = (s) => {
                if (selected.includes(s)) onFilterChange(selected.filter(x => x !== s));
                else onFilterChange([...selected, s]);
              };

              return (
                <div style={{position:'relative'}}>
                  <button onClick={() => setStatusMenuOpen(o => !o)}
                    style={{...selectStyle, textAlign:'left', cursor:'pointer', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                    <span>{label}</span>
                    <span style={{opacity:0.6,fontSize:'10px'}}>▾</span>
                  </button>
                  {statusMenuOpen && (
                    <div style={{
                      position:'absolute', top:'calc(100% + 4px)', left:0, right:0,
                      background: A.bgSoft, border:'0.5px solid '+A.border, borderRadius:'7px',
                      padding:'6px', zIndex:20, maxHeight:'320px', overflowY:'auto',
                      boxShadow:'0 4px 14px rgba(0,0,0,0.25)'
                    }}>
                      {/* Préset "Tous" : décoche tout */}
                      <button onClick={() => { onFilterChange([]); setStatusMenuOpen(false); }}
                        style={{display:'block',width:'100%',textAlign:'left',padding:'6px 10px',background: isAllSelected ? A.bgActive : 'transparent', color: A.text, border:'none', borderRadius:'5px', cursor:'pointer', fontSize:'12px', fontFamily:"'DM Sans',sans-serif",marginBottom:'2px'}}>
                        {isAllSelected ? '✓ ' : ''}Tous
                      </button>
                      {/* Préset "Devis en cours" */}
                      <button onClick={() => onFilterChange(isDevisEnCours ? [] : [...DEVIS_EN_COURS])}
                        style={{display:'block',width:'100%',textAlign:'left',padding:'6px 10px',background: isDevisEnCours ? A.bgActive : 'transparent', color: A.text, border:'none', borderRadius:'5px', cursor:'pointer', fontSize:'12px', fontFamily:"'DM Sans',sans-serif",marginBottom:'4px'}}>
                        {isDevisEnCours ? '✓ ' : ''}📊 Devis en cours
                      </button>
                      <div style={{height:'1px',background:A.border,margin:'4px 0'}}></div>
                      {/* Liste des statuts individuels (checkboxes) */}
                      {ALL_STATUS.map(s => {
                        const checked = selected.includes(s);
                        return (
                          <label key={s} style={{display:'flex',alignItems:'center',gap:'8px',padding:'5px 10px',cursor:'pointer',color:A.text,fontSize:'12px',fontFamily:"'DM Sans',sans-serif",borderRadius:'5px',background: checked ? A.bgActive : 'transparent'}}>
                            <input type="checkbox" checked={checked} onChange={() => toggleStatus(s)}
                              style={{accentColor:'#5DCAA5',cursor:'pointer',margin:0}} />
                            {s}
                          </label>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })()}
          </div>

          {isAdmin && (
            <div style={{padding:'10px 14px 0'}}>
              <label style={labelStyle}>Commercial</label>
              <select value={filterCommercial} onChange={(e) => onFilterCommercialChange(e.target.value)} style={selectStyle}>
                {['Tous', 'Roger', 'Christian', 'Frédéric'].map(commercial => {
                  const count = getProspectCountByCommercial(allProspects, commercial);
                  return <option key={commercial} value={commercial}>{commercial} ({count})</option>;
                })}
              </select>
            </div>
          )}

          {/* === Trier par === */}
          <div style={{padding:'10px 14px 12px'}}>
            <label style={labelStyle}>Trier par</label>
            <div style={{display:'flex',background:A.bgSoft,border:'0.5px solid '+A.border,borderRadius:'7px',padding:'2px',gap:'2px'}}>
              {[{label:'Nom', value:'name'}, {label:'Ancienneté', value:'ancienneté'}, {label:'Probabilité', value:'probabilité'}].map(option => (
                <button key={option.value} onClick={() => onSortChange(option.value)}
                  style={{flex:1,padding:'5px 4px',border:'none',borderRadius:'5px',fontSize:'10px',fontWeight: sortBy===option.value ? 600 : 500,
                    background: sortBy===option.value ? A.bgActive : 'transparent',
                    color: sortBy===option.value ? A.text : A.textDim,
                    cursor:'pointer',transition:'all .15s',fontFamily:"'DM Sans',sans-serif",whiteSpace:'nowrap'}}>
                  {option.label}
                </button>
              ))}
            </div>
          </div>

          {/* === Liste des sociétés === */}
          <div className="tw-dark-scroll" style={{borderTop:'0.5px solid '+A.border,flex:1,overflowY:'auto'}}>
            {prospects.map(prospect => {
              const isActive = selectedProspect?.id === prospect.id;
              const ai = prospectActionsInfo[prospect.id];
              const hasAction = ai && ai.hasAction;
              const isLate = ai && ai.isLate;
              const statut = prospect.statut_societe || 'Prospect';

              // Couleur de la bordure latérale
              let leftBorderColor = 'transparent';
              if (prospect.real_status === 'Ajourné N+1') leftBorderColor = A.amber;
              else if (prospect.real_status === 'Éliminé par nous' || prospect.real_status === 'Perdu') leftBorderColor = A.textMuted;
              else if (!prospect.real_status && !hasAction) leftBorderColor = A.red;
              else if (hasAction && !isLate) leftBorderColor = A.teal;
              else if (isLate) leftBorderColor = A.red;

              // Couleur pill de statut société
              const pillStyle = statut === 'Client'
                ? {background:'rgba(93,202,165,.15)', color:A.teal}
                : statut === 'Suspect'
                ? {background:'rgba(170,180,194,.15)', color:A.textDim}
                : {background:'rgba(239,194,116,.15)', color:A.amber};

              // Couleur du real_status
              const statusColor = prospect.real_status === 'Perdu' ? A.red
                                : prospect.real_status === 'Gagné' || prospect.real_status === 'Signé' ? A.teal
                                : prospect.real_status === 'Discussion' ? A.blue
                                : prospect.real_status === 'Envoyé' ? A.amber
                                : prospect.real_status ? A.text
                                : A.textMuted;

              return (
                <div key={prospect.id}
                  onClick={() => onSelect(prospect)}
                  style={{
                    padding:'10px 14px',
                    background: isActive ? A.bgActive : 'transparent',
                    borderBottom:'0.5px solid '+A.border,
                    borderLeft:'3px solid '+leftBorderColor,
                    cursor:'pointer',
                    transition:'background .15s'
                  }}
                  onMouseEnter={(e) => { if (!isActive) e.currentTarget.style.background = A.bgHover; }}
                  onMouseLeave={(e) => { if (!isActive) e.currentTarget.style.background = 'transparent'; }}
                >
                  {/* Ligne 1 : nom + pill statut société */}
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:'8px'}}>
                    <div style={{fontSize:'13px',fontWeight:500,color:A.text,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                      {prospectDisplayName(prospect)}
                    </div>
                    <span style={{fontSize:'10px',fontWeight:500,padding:'2px 7px',borderRadius:'10px',flexShrink:0,...pillStyle}}>
                      {statut}
                    </span>
                  </div>

                  {/* Ligne 2 : contact */}
                  {prospect.contact_name && (
                    <div style={{fontSize:'11px',color:A.textDim,marginTop:'2px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{prospect.contact_name}</div>
                  )}

                  {/* Ligne 3 : status devis + date */}
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:'4px'}}>
                    {prospect.real_status ? (
                      <span style={{fontSize:'11px',fontWeight:500,color:statusColor}}>
                        {prospect.real_status}
                        {prospect.real_probability > 0 && (
                          <span style={{fontWeight:400,marginLeft:'4px',color:A.textDim}}>· {prospect.real_probability}%</span>
                        )}
                      </span>
                    ) : (
                      <span style={{fontSize:'11px',color:A.textMuted,fontStyle:'italic'}}>Aucun devis actif</span>
                    )}
                    {prospect.real_quote_date && (
                      <span style={{fontSize:'10px',color:A.textMuted}}>{new Date(prospect.real_quote_date).toLocaleDateString('fr-FR')}</span>
                    )}
                  </div>

                  {/* Ligne 4 : prochaine action ou alerte */}
                  <div style={{fontSize:'11px',marginTop:'4px',color:A.textDim}}>
                    {hasAction ? (() => {
                      const dateStr = ai.nextActionDate ? new Date(ai.nextActionDate).toLocaleDateString('fr-FR') : '';
                      return (
                        <span>
                          {ai.nextActionType && <span style={{color:A.text,fontWeight:500}}>{ai.nextActionType}</span>}
                          {dateStr && <span style={{color: isLate ? A.red : A.textDim,fontWeight: isLate ? 500 : 400}}> · {dateStr}{isLate ? ' (retard)' : ''}</span>}
                          {ai.nextActionActor && <span style={{color:A.textMuted}}> · {ai.nextActionActor}{ai.nextActionContact ? ' → ' + ai.nextActionContact : ''}</span>}
                        </span>
                      );
                    })() : (
                      <span style={{color:A.red}}>Aucune action planifiée</span>
                    )}
                  </div>

                  {/* Ligne 5 : montants */}
                  {(prospect.real_monthly_amount || prospect.monthly_amount) > 0 && (
                    <div style={{fontSize:'11px',marginTop:'4px',color:A.text,fontVariantNumeric:'tabular-nums',fontWeight:500}}>
                      {fmtK(parseFloat(prospect.real_monthly_amount || prospect.monthly_amount) || 0)}<span style={{color:A.textMuted,fontWeight:400}}> /mois</span>
                      {(prospect.real_annual_amount || prospect.annual_amount) > 0 && (
                        <span> + {fmtK(parseFloat(prospect.real_annual_amount || prospect.annual_amount) || 0)}<span style={{color:A.textMuted,fontWeight:400}}> /an</span></span>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function DashboardConsultant({ prospects, user, prospectActionsInfo, onSelectProspect, onOpenDashboard, API_URL }) {
      const today = new Date(); today.setHours(0,0,0,0);
      const fmt = (n) => (n||0).toLocaleString('fr-FR', {minimumFractionDigits:2, maximumFractionDigits:2});
      const [sortCol, setSortCol] = React.useState('name');
      const [sortAsc, setSortAsc] = React.useState(true);
      // Filtre par type de société pour le tableau "Mes dossiers" : 'all', 'Suspect', 'Prospect', 'Client'
      const [typeFilter, setTypeFilter] = React.useState('all');

      const handleSort = (col) => {
        if (sortCol === col) setSortAsc(a => !a);
        else { setSortCol(col); setSortAsc(true); }
      };
      const sortArrow = (col) => sortCol === col ? (sortAsc ? ' ↑' : ' ↓') : ' ↕';

      const mine = prospects.filter(p => p.assigned_to === user.name);
      const myPipeline = mine.filter(p => p.real_status && ['En cours','Envoyé','Discussion','Négociation'].includes(p.real_status));
      const myGagnes   = mine.filter(p => p.real_status === 'Gagné');

      const nbDevisActifs = myPipeline.length;
      const myActions = Object.entries(prospectActionsInfo).filter(([id]) => mine.some(p => String(p.id) === String(id)));
      const nbRetard  = myActions.filter(([,a]) => a.isLate).length;

      const aboMensuel  = myPipeline.reduce((s,p) => s + (parseFloat(p.real_monthly_amount||p.monthly_amount)||0), 0);
      const aboPondere  = myPipeline.reduce((s,p) => s + (parseFloat(p.real_monthly_amount||p.monthly_amount)||0) * ((p.real_probability||0)/100), 0);
      const setupBrut   = myPipeline.reduce((s,p) => s + (parseFloat(p.real_setup_amount||p.setup_amount)||0), 0);
      const setupPondere= myPipeline.reduce((s,p) => s + (parseFloat(p.real_setup_amount||p.setup_amount)||0) * ((p.real_probability||0)/100), 0);
      const aboGagneM   = myGagnes.reduce((s,p) => s + (parseFloat(p.real_monthly_amount||p.monthly_amount)||0), 0);
      const aboGagneA   = myGagnes.reduce((s,p) => s + (parseFloat(p.real_annual_amount||p.annual_amount)||0), 0);
      const setupGagnes = myGagnes.reduce((s,p) => s + (parseFloat(p.real_setup_amount||p.setup_amount)||0), 0);

      const initials = user.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);

      const statusChip = (status) => {
        const map = {
          'En cours':   {cls:'var(--tw-teal)',   bg:'var(--tw-teal-light)'},
          'Envoyé':     {cls:'#f0932b',          bg:'#fff8e1'},
          'Discussion': {cls:'var(--tw-blue)',   bg:'#e8f4fd'},
          'Négociation':{cls:'#9b59b6',          bg:'#f5eef8'},
          'Gagné':      {cls:'var(--tw-green)',  bg:'#e8f8f0'},
          'Perdu':      {cls:'var(--tw-red)',    bg:'#fdecea'},
        };
        const s = map[status] || {cls:'var(--tw-muted)', bg:'#f5f5f5'};
        return <span style={{fontSize:'11px',fontWeight:'600',padding:'2px 9px',borderRadius:'10px',color:s.cls,background:s.bg}}>{status||'Prospection'}</span>;
      };

      const thisYear = new Date().getFullYear();

      return (
        <div className="tw-content">

          {/* HEADER CONSULTANT */}
          <div style={{background:'white',border:'1px solid var(--tw-border)',borderRadius:'10px',padding:'18px 22px',marginBottom:'18px',display:'flex',alignItems:'center',gap:'18px',boxShadow:'0 1px 3px rgba(0,125,137,.06)'}}>
            <div className="tw-avatar" style={{width:'48px',height:'48px',fontSize:'17px',background:'linear-gradient(135deg,var(--tw-teal),#00a8b8)',flexShrink:0}}>{initials}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:'17px',fontWeight:'600',color:'var(--tw-ink)'}}>{user.name}</div>
              <div style={{fontSize:'12px',color:'var(--tw-muted)',marginTop:'2px'}}>Mes dossiers · accès restreint à votre portefeuille</div>
            </div>
            <div style={{display:'flex',gap:'28px'}}>
              {[
                {val:mine.length,       lbl:'Sociétés',    color:'var(--tw-teal)'},
                {val:nbDevisActifs,     lbl:'Devis actifs',color:'var(--tw-ink)'},
                {val:nbRetard,          lbl:'En retard',   color:nbRetard>0?'var(--tw-red)':'var(--tw-muted)'},
              ].map(k => (
                <div key={k.lbl} style={{textAlign:'center'}}>
                  <div style={{fontSize:'24px',fontWeight:'700',color:k.color,fontVariantNumeric:'tabular-nums'}}>{k.val}</div>
                  <div style={{fontSize:'11px',color:'var(--tw-muted)',textTransform:'uppercase',letterSpacing:'.4px'}}>{k.lbl}</div>
                </div>
              ))}
            </div>
          </div>

          {/* CARTES FINANCIÈRES */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'14px',marginBottom:'18px'}}>
            <div className="tw-kpi-card">
              <div className="tw-kpi-label">Potentiel de mes devis en cours</div>
              <div className="tw-kpi-duo" style={{marginTop:'10px'}}>
                <div>
                  <div className="tw-duo-lbl">Abo</div>
                  <div className="tw-duo-val" style={{color:'var(--tw-teal)'}}>{fmt(aboMensuel)} €<span style={{fontSize:'11px',color:'var(--tw-slate)',fontWeight:'400'}}>/mois</span></div>
                  <div className="tw-duo-sub">Pondéré <b style={{color:'var(--tw-teal)'}}>{fmt(aboPondere)} €</b></div>
                </div>
                <div className="tw-kpi-duo-sep"></div>
                <div>
                  <div className="tw-duo-lbl">Setup</div>
                  <div className="tw-duo-val">{fmt(setupBrut)} €</div>
                  <div className="tw-duo-sub">Pondéré <b>{fmt(setupPondere)} €</b></div>
                </div>
              </div>
            </div>
            <div className="tw-kpi-card">
              <div className="tw-kpi-label">Mes signés depuis janvier {thisYear}</div>
              <div className="tw-kpi-duo" style={{marginTop:'10px'}}>
                <div>
                  <div className="tw-duo-lbl">Abo</div>
                  <div className="tw-duo-val" style={{color:'var(--tw-green)'}}>{fmt(aboGagneM)} €<span style={{fontSize:'11px',color:'var(--tw-slate)',fontWeight:'400'}}>/mois</span></div>
                  <div className="tw-duo-sub">+ <b style={{color:'var(--tw-green)'}}>{fmt(aboGagneA)} €</b>/an</div>
                </div>
                <div className="tw-kpi-duo-sep"></div>
                <div>
                  <div className="tw-duo-lbl">Setup</div>
                  <div className="tw-duo-val" style={{color:'var(--tw-green)'}}>{fmt(setupGagnes)} €</div>
                  <div className="tw-duo-sub">{myGagnes.length} affaire{myGagnes.length>1?'s':''} signée{myGagnes.length>1?'s':''}</div>
                </div>
              </div>
            </div>
          </div>

          {/* TABLEAU MES DOSSIERS */}
          <div className="tw-section-title">Mes dossiers ({mine.length})</div>
          {/* Barre de filtre par type : Tous / Suspect / Prospect / Client.
              Le filtre est local à ce tableau, pas global (n'impacte pas les autres parties du dashboard). */}
          <div style={{display:'flex',gap:'6px',marginBottom:'10px',alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:'11px',color:'var(--tw-muted)',marginRight:'4px',textTransform:'uppercase',letterSpacing:'.4px',fontWeight:'600'}}>Type :</span>
            {[
              {key:'all',      label:'Tous'},
              {key:'Suspect',  label:'Suspect'},
              {key:'Prospect', label:'Prospect'},
              {key:'Client',   label:'Client'},
            ].map(t => {
              const active = typeFilter === t.key;
              const count = t.key === 'all' ? mine.length : mine.filter(p => p.statut_societe === t.key).length;
              return (
                <button key={t.key} onClick={() => setTypeFilter(t.key)}
                  style={{
                    padding:'4px 11px',
                    background: active ? 'var(--tw-ink)' : 'white',
                    color: active ? 'white' : 'var(--tw-slate)',
                    border:'0.5px solid ' + (active ? 'var(--tw-ink)' : 'var(--tw-border)'),
                    borderRadius:'14px',fontSize:'12px',cursor:'pointer',
                    fontFamily:"'DM Sans',sans-serif",
                    transition:'all .15s'
                  }}>
                  {t.label} <span style={{opacity:0.6,marginLeft:'3px'}}>({count})</span>
                </button>
              );
            })}
          </div>
          <div style={{background:'white',border:'1px solid var(--tw-border)',borderRadius:'10px',overflow:'hidden',boxShadow:'0 1px 3px rgba(0,125,137,.06)'}}>
            {/* Header triable */}
            <div style={{display:'grid',gridTemplateColumns:'1.8fr 0.9fr 1.1fr 0.7fr 1.5fr 0.8fr',padding:'9px 16px',background:'var(--tw-bg)',borderBottom:'1px solid var(--tw-border)',fontSize:'11px',fontWeight:'600',color:'var(--tw-muted)',textTransform:'uppercase',letterSpacing:'.5px'}}>
              {[
                {lbl:'Société',          col:'name'},
                {lbl:'Type',             col:'type'},
                {lbl:'Statut',           col:'status'},
                {lbl:'Proba',            col:'proba'},
                {lbl:'Prochaine action', col:'action'},
              ].map(h => (
                <div key={h.col} onClick={() => handleSort(h.col)}
                  style={{cursor:'pointer',userSelect:'none',display:'flex',alignItems:'center',gap:'3px'}}
                  onMouseEnter={e=>e.currentTarget.style.color='var(--tw-teal)'}
                  onMouseLeave={e=>e.currentTarget.style.color='var(--tw-muted)'}
                >
                  {h.lbl}
                  <span style={{fontSize:'10px',opacity: sortCol===h.col?1:0.4}}>{sortArrow(h.col)}</span>
                </div>
              ))}
              <div></div>
            </div>
            {mine.filter(p => typeFilter === 'all' || p.statut_societe === typeFilter).length === 0 && (
              <div style={{padding:'30px',textAlign:'center',color:'var(--tw-muted)',fontSize:'13px'}}>
                {typeFilter === 'all' ? 'Aucune société assignée' : `Aucune société de type "${typeFilter}"`}
              </div>
            )}
            {[...mine]
              .filter(p => typeFilter === 'all' || p.statut_societe === typeFilter)
              .sort((a,b) => {
              let va, vb;
              if (sortCol==='name')   { va=a.name||''; vb=b.name||''; return sortAsc?va.localeCompare(vb):vb.localeCompare(va); }
              if (sortCol==='type')   { va=a.statut_societe||''; vb=b.statut_societe||''; return sortAsc?va.localeCompare(vb):vb.localeCompare(va); }
              if (sortCol==='status') { va=a.real_status||''; vb=b.real_status||''; return sortAsc?va.localeCompare(vb):vb.localeCompare(va); }
              if (sortCol==='proba')  { va=a.real_probability||0; vb=b.real_probability||0; return sortAsc?va-vb:vb-va; }
              if (sortCol==='action') {
                const da = prospectActionsInfo[a.id]?.nextActionDate ? new Date(prospectActionsInfo[a.id].nextActionDate).getTime() : Infinity;
                const db = prospectActionsInfo[b.id]?.nextActionDate ? new Date(prospectActionsInfo[b.id].nextActionDate).getTime() : Infinity;
                return sortAsc?da-db:db-da;
              }
              return 0;
            }).map(p => {
              const ai = prospectActionsInfo[p.id];
              const hasAction = ai?.hasAction;
              const isLate = ai?.isLate;
              const actionDate = ai?.nextActionDate ? new Date(ai.nextActionDate) : null;
              const dateStr = actionDate ? actionDate.toLocaleDateString('fr-FR') : null;
              return (
                <div key={p.id} style={{display:'grid',gridTemplateColumns:'1.8fr 0.9fr 1.1fr 0.7fr 1.5fr 0.8fr',padding:'11px 16px',borderBottom:'1px solid #f5f5f5',alignItems:'center',cursor:'pointer',transition:'background .12s'}}
                  onMouseEnter={e=>e.currentTarget.style.background='var(--tw-teal-light)'}
                  onMouseLeave={e=>e.currentTarget.style.background='white'}
                  onClick={() => { onSelectProspect(p); onOpenDashboard(); }}
                >
                  <div>
                    <div style={{fontWeight:'600',fontSize:'13px',color:'var(--tw-ink)'}}>{prospectDisplayName(p)}</div>
                    <div style={{fontSize:'11px',color:'var(--tw-muted)',marginTop:'2px'}}>{p.contact_name||'—'}</div>
                  </div>
                  <div>{typeChip(p.statut_societe)}</div>
                  <div>{statusChip(p.real_status)}</div>
                  <div style={{fontSize:'13px',fontWeight:'700',color:
                    p.real_probability>=80?'var(--tw-green)':
                    p.real_probability>=40?'var(--tw-orange)':'var(--tw-slate)'
                  }}>{p.real_probability||0}%</div>
                  <div style={{fontSize:'12px'}}>
                    {hasAction ? (
                      <span style={{color:isLate?'var(--tw-red)':'var(--tw-slate)',fontWeight:isLate?'600':'400'}}>
                        ⚡ {ai.nextActionType||'Action'} · {dateStr}{isLate?' ⚠️':''}
                      </span>
                    ) : (
                      <span style={{color:'var(--tw-muted)',fontStyle:'italic'}}>Aucune action</span>
                    )}
                  </div>
                  <div>
                    <button style={{padding:'4px 12px',background:'var(--tw-teal)',color:'white',border:'none',borderRadius:'6px',fontSize:'12px',fontWeight:'500',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>
                      Ouvrir →
                    </button>
                  </div>
                </div>
              );
            })}
          </div>

        </div>
      );
    }

    function Dashboard({ prospects, selectedCommercial, onSelectCommercial, onSelectProspect, onOpenDashboard, user, API_URL, prospectActionsInfo, onShowRecap, setShowCompteurModal, setCompteurModalData, codesNaf = [], onRefreshProspects, setFilterCommercial, setFilterStatus, setFilterAttribution }) {

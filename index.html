<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipeline TexasWin</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    button, input, select, textarea { font-family: inherit; }
    .tw-topbar input::placeholder { color: rgba(255,255,255,.55); }
    :root {
      /* ── Tokens officiels charte TexasWin v1.0 ── */
      --primary: #1A56DB; --primary-dark: #123EA3; --primary-soft: #E8F0FF;
      --accent-orange: #FF6A00; --accent-amber: #FF971D;
      --hero-deep: #0B1F4E; --hero-mid: #0E2A6D; --hero-bright: #1A56DB;
      --success: #059669; --success-soft: rgba(5,150,105,.10);
      --warning: #D97706; --warning-soft: rgba(217,119,6,.10);
      --danger: #DC2626; --danger-soft: rgba(220,38,38,.10);
      --bg: #F7F8FA; --surface: #FFFFFF; --surface-hover: #F1F3F7;
      --text: #111827; --text-2: #4B5563; --meta: #9CA3AF;
      --border: rgba(17,24,39,.08);
      --r-xs: 8px; --r-sm: 14px; --r-md: 20px; --r-lg: 28px; --r-pill: 999px;
      --sh-sm: 0 8px 24px rgba(17,24,39,.06); --sh-md: 0 20px 50px rgba(17,24,39,.10);
      --ease: 220ms cubic-bezier(.16,1,.3,1);
      --mono: 'SF Mono', ui-monospace, 'Cascadia Mono', monospace;

      /* ── Alias Pipeline → tokens charte (diff minimal) ── */
      --tw-teal:       var(--primary);
      --tw-teal-light: var(--primary-soft);
      --tw-ink:        var(--text);
      --tw-slate:      var(--text-2);
      --tw-muted:      var(--meta);
      --tw-border:     var(--border);
      --tw-bg:         var(--bg);
      --tw-green:      var(--success);
      --tw-orange:     var(--warning);
      --tw-red:        var(--danger);
      --tw-blue:       var(--primary);
    }
    /* ── TOPBAR PROTOTYPE ── */
    .tw-topbar {
      height: 62px;
      background: rgba(10,22,55,.88);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: var(--r-pill);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      position: sticky;
      top: 14px;
      margin: 14px 16px 6px;
      z-index: 200;
      box-shadow: var(--sh-md);
      color: #fff;
    }
    .tw-logo {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -.4px;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .tw-logo img { height: 28px; }
    .tw-nav { display: flex; gap: 2px; }
    .tw-nav-btn {
      padding: 6px 14px;
      border-radius: var(--r-pill);
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,.85);
      cursor: pointer;
      border: 1px solid transparent;
      background: transparent;
      font-family: 'Inter', system-ui, sans-serif;
      transition: all .15s;
      white-space: nowrap;
    }
    .tw-nav-btn:hover { background: rgba(255,255,255,.10); border-color: rgba(255,255,255,.14); color: #fff; }
    .tw-nav-btn.tw-active { background: var(--primary); color: #fff; font-weight: 600; }
    .tw-search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: var(--r-pill);
      padding: 5px 12px;
      min-width: 220px;
      flex: 1;
      max-width: 320px;
      transition: border-color .15s;
      position: relative;
    }
    .tw-search-box:focus-within { border-color: rgba(255,255,255,.35); background: rgba(255,255,255,.16); }
    .tw-search-box input {
      border: none;
      background: transparent;
      outline: none;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      color: #fff;
      width: 100%;
    }
    .tw-search-box input::placeholder { color: rgba(255,255,255,.55); }
    .tw-search-box svg { stroke: rgba(255,255,255,.7); }
    .tw-btn-new {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      background: linear-gradient(180deg, #2B6BF0, var(--primary));
      color: #fff;
      border: none;
      border-radius: var(--r-pill);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .15s;
    }
    .tw-btn-new:hover { opacity: .88; }
    .tw-btn-icon {
      padding: 5px 12px;
      border-radius: var(--r-pill);
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,.85);
      cursor: pointer;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.10);
      font-family: 'Inter', system-ui, sans-serif;
      transition: all .15s;
      white-space: nowrap;
    }
    .tw-btn-icon:hover { background: rgba(255,255,255,.18); color: #fff; border-color: rgba(255,255,255,.28); }
    .tw-user-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 3px 10px 3px 3px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: var(--r-pill);
      font-size: 12px;
      font-weight: 500;
      color: #fff;
      white-space: nowrap;
    }
    .tw-avatar {
      width: 26px; height: 26px;
      background: var(--tw-teal);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: white;
      font-weight: 700;
      flex-shrink: 0;
    }
    .tw-search-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: white;
      border: 1px solid var(--tw-border);
      border-radius: 8px;
      box-shadow: var(--sh-sm);
      z-index: 9999;
      max-height: 380px;
      overflow-y: auto;
    }
    .tw-search-item {
      padding: 10px 14px;
      border-bottom: 1px solid #f5f5f5;
      cursor: pointer;
      transition: background .12s;
    }
    .tw-search-item:last-child { border-bottom: none; }
    .tw-search-item:hover { background: var(--tw-teal-light); }
    /* ── DASHBOARD PROTOTYPE ── */
    .tw-content { flex: 1; padding: 22px; overflow-y: auto; }
    .tw-section-title {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; color: var(--tw-muted); margin-bottom: 12px;
    }
    .tw-kpi-strip { display: grid; grid-template-columns: repeat(5,1fr); gap: 12px; margin-bottom: 24px; }
    .tw-kpi-card {
      background: white; border: 1px solid var(--tw-border);
      border-radius: 10px; padding: 16px 20px;
      box-shadow: var(--sh-sm);
    }
    .tw-kpi-label { font-size: 11px; color: var(--tw-muted); font-weight: 500; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .tw-kpi-value { font-size: 26px; font-weight: 600; font-family: 'Inter', system-ui, sans-serif; font-variant-numeric: tabular-nums; color: var(--tw-ink); line-height: 1; }
    .tw-kpi-sub { font-size: 12px; color: var(--tw-slate); margin-top: 5px; }
    .tw-kpi-sub b { color: var(--tw-ink); }
    .tw-kpi-duo { display: flex; gap: 16px; margin-top: 10px; }
    .tw-kpi-duo-sep { width: 1px; background: var(--tw-border); align-self: stretch; flex-shrink: 0; }
    .tw-duo-lbl { font-size: 10px; color: var(--tw-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
    .tw-duo-val { font-size: 18px; font-weight: 600; font-family: 'Inter', system-ui, sans-serif; font-variant-numeric: tabular-nums; }
    .tw-duo-sub { font-size: 11px; color: var(--tw-muted); margin-top: 2px; }
    /* Tab commerciaux */
    .tw-tab-wrap { background: white; border: 1px solid var(--tw-border); border-radius: 10px; box-shadow: var(--sh-sm); margin-bottom: 24px; overflow: hidden; }
    .tw-tabs { display: flex; border-bottom: 1px solid var(--tw-border); background: var(--tw-bg); overflow-x: auto; }
    .tw-tab {
      padding: 11px 16px; font-family: 'Inter', system-ui, sans-serif; font-size: 13px; font-weight: 500;
      border: none; background: transparent; color: var(--tw-slate); cursor: pointer;
      border-bottom: 3px solid transparent; transition: all .15s; white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
    }
    .tw-tab:hover { color: var(--tw-teal); background: var(--tw-teal-light); }
    .tw-tab.tw-tab-active { color: var(--tw-teal); border-bottom-color: var(--tw-teal); background: white; font-weight: 600; }
    .tw-tab-badge { display: inline-flex; align-items: center; justify-content: center; width: 17px; height: 17px; background: var(--tw-red); color: white; border-radius: 50%; font-size: 10px; font-weight: 700; }
    .tw-tab-body { padding: 18px 22px; }
    /* Stat rows dans tab */
    .tw-cs-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; margin-bottom: 14px; }
    .tw-cs-item { background: var(--tw-bg); border-radius: 6px; padding: 10px; text-align: center; cursor: pointer; transition: background .15s; }
    .tw-cs-item:hover { background: var(--tw-teal-light); }
    .tw-cs-val { font-size: 20px; font-weight: 700; font-family: 'Inter', system-ui, sans-serif; font-variant-numeric: tabular-nums; }
    .tw-cs-lbl { font-size: 10px; color: var(--tw-muted); text-transform: uppercase; letter-spacing: .4px; margin-top: 3px; }
    .tw-row-line { display: flex; gap: 10px; margin-bottom: 8px; }
    .tw-row-box { flex: 1; background: var(--tw-bg); border-radius: 6px; padding: 9px 13px; display: flex; align-items: center; justify-content: space-between; }
    .tw-row-lbl { font-size: 12px; color: var(--tw-slate); }
    .tw-chips { display: flex; gap: 5px; flex-wrap: wrap; }
    .tw-chip { font-size: 11px; padding: 2px 8px; border-radius: 8px; background: #f0f0f0; font-weight: 600; }
    .tw-pill-green { background: #e8f8f0; color: var(--tw-green); font-size: 12px; padding: 2px 9px; border-radius: 10px; font-weight: 500; }
    .tw-pill-red   { background: #fdecea; color: var(--tw-red);   font-size: 12px; padding: 2px 9px; border-radius: 10px; font-weight: 500; }
    /* 2 col stats */
    .tw-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px; }
    .tw-card { background: white; border: 1px solid var(--tw-border); border-radius: 10px; padding: 18px; box-shadow: var(--sh-sm); }
    .tw-card-title { font-size: 13px; font-weight: 600; color: var(--tw-ink); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--tw-border); }
    .tw-prob-row { margin-bottom: 10px; }
    .tw-prob-hdr { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; }
    .tw-prob-bar-bg { height: 6px; background: #f0f0f0; border-radius: 3px; overflow: hidden; }
    .tw-prob-bar-fill { height: 100%; border-radius: 3px; }
    .tw-age-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f5f5f5; font-size: 12px; }
    .tw-age-row:last-child { border-bottom: none; }
    .tw-age-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .tw-age-val { font-family: 'Inter', system-ui, sans-serif; font-variant-numeric: tabular-nums; font-weight: 700; font-size: 15px; }
    /* Base stats card */
    .tw-stat-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #f8f8f8; font-size: 13px; }
    .tw-stat-row:last-child { border-bottom: none; }
    .tw-stat-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 7px; flex-shrink: 0; }
    .tw-stat-val { font-weight: 700; font-family: 'Inter', system-ui, sans-serif; font-variant-numeric: tabular-nums; font-size: 15px; }

    /* ==================== SYSTÈME DE TOAST ==================== */
    .tw-toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    .tw-toast {
      background: white;
      border: 0.5px solid var(--tw-border);
      border-radius: 10px;
      padding: 12px 16px 12px 14px;
      min-width: 280px;
      max-width: 400px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
      display: flex;
      align-items: flex-start;
      gap: 12px;
      pointer-events: auto;
      animation: tw-toast-in 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      font-family: 'Inter', system-ui, sans-serif;
    }
    .tw-toast.tw-toast-leaving {
      animation: tw-toast-out 0.2s cubic-bezier(0.4, 0, 1, 1) forwards;
    }
    .tw-toast-success { border-left: 3px solid var(--tw-green); }
    .tw-toast-error   { border-left: 3px solid var(--tw-red); }
    .tw-toast-warning { border-left: 3px solid var(--tw-orange); }
    .tw-toast-info    { border-left: 3px solid var(--tw-teal); }
    .tw-toast-icon {
      flex-shrink: 0;
      margin-top: 1px;
      width: 16px;
      height: 16px;
    }
    .tw-toast-success .tw-toast-icon { color: var(--tw-green); }
    .tw-toast-error   .tw-toast-icon { color: var(--tw-red); }
    .tw-toast-warning .tw-toast-icon { color: var(--tw-orange); }
    .tw-toast-info    .tw-toast-icon { color: var(--tw-teal); }
    .tw-toast-content {
      flex: 1;
      min-width: 0;
    }
    .tw-toast-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--tw-ink);
      margin: 0;
      line-height: 1.4;
    }
    .tw-toast-msg {
      font-size: 12px;
      color: var(--tw-slate);
      margin: 2px 0 0;
      line-height: 1.4;
      word-wrap: break-word;
    }
    .tw-toast-close {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      padding: 0;
      background: transparent;
      border: none;
      color: var(--tw-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      margin-top: -1px;
      transition: background 0.15s, color 0.15s;
    }
    .tw-toast-close:hover { background: var(--tw-bg); color: var(--tw-slate); }
    @keyframes tw-toast-in {
      from { opacity: 0; transform: translateY(8px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes tw-toast-out {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(20px); }
    }

    /* === Scrollbar sombre pour LeftPanel anthracite === */
    .tw-dark-scroll {
      scrollbar-width: thin;
      scrollbar-color: #4d5868 transparent;
    }
    .tw-dark-scroll::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    .tw-dark-scroll::-webkit-scrollbar-track {
      background: transparent;
    }
    .tw-dark-scroll::-webkit-scrollbar-thumb {
      background: #4d5868;
      border-radius: 4px;
      border: 2px solid transparent;
      background-clip: content-box;
    }
    .tw-dark-scroll::-webkit-scrollbar-thumb:hover {
      background: #5d6a7d;
      background-clip: content-box;
      border: 2px solid transparent;
    }
    .tw-dark-scroll::-webkit-scrollbar-corner {
      background: transparent;
    }

    /* ── Accessibilité & motion (exigences charte TexasWin v1.0) ── */
    :focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- Module SocieteInfo : appelle le proxy backend /api/societeinfo/* avec le token JWT -->
  <script src="/societeinfo.js"></script>

  <!-- Couche d'abstraction de la navigation rapide (window.NavApi) : SEUL point qui
       parle aux routes /api/nav, /api/search, /api/peek. Chargé avant l'overlay. -->
  <script src="/services/navApi.js"></script>

  <!-- ====================================================================
       COUCHE DE NAVIGATION RAPIDE (overlay) — montée dans un SECOND root React,
       par-dessus l'app existante (rien n'est remplacé). Tout est encapsulé dans
       une IIFE pour ne PAS entrer en collision avec les `const` globaux du bloc
       principal (Babel compile les deux scripts dans la portée globale).
       Dépendances : React/ReactDOM (globaux) + window.NavApi (services/navApi.js).
       Couplage avec l'app : uniquement via les CustomEvents 'tw:navigate'/'tw:peek'.
       ==================================================================== -->
  <!-- App precompilee par Vite (remplace Babel-in-browser). main.jsx importe l'overlay. -->
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Test API Pappers</title></head>
<body>
<h2>Test API Pappers</h2>
<button onclick="test1()">Test 1: Recherche "gerard darel"</button><br><br>
<button onclick="test2()">Test 2: Recherche "GD Distribution"</button><br><br>
<pre id="result" style="background:#eee;padding:10px;white-space:pre-wrap;font-size:11px;max-height:500px;overflow:auto;"></pre>
<script>
const KEY = '39d8a918f85b6ffe33778277d82852e4020f28ee754d58f6';
const log = t => document.getElementById('result').textContent = JSON.stringify(t, null, 2);

async function test1() {
  const r = await fetch(`https://api.pappers.fr/v2/recherche?api_token=${KEY}&q=gerard+darel&par_page=5`);
  log({ status: r.status, data: await r.json() });
}

async function test2() {
  const r = await fetch(`https://api.pappers.fr/v2/recherche?api_token=${KEY}&q=GD+Distribution&par_page=5`);
  log({ status: r.status, data: await r.json() });
}
</script>
</body>
</html>

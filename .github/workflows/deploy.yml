name: Deploy to Scaleway

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  SCW_REGION: fr-par
  REGISTRY_NAMESPACE: pipeline-app
  IMAGE_NAME: pipeline-app

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: image
        run: echo "tag=$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: rg.${{ env.SCW_REGION }}.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            rg.${{ env.SCW_REGION }}.scw.cloud/${{ env.REGISTRY_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.image.outputs.tag }}
            rg.${{ env.SCW_REGION }}.scw.cloud/${{ env.REGISTRY_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest

  notify-success:
    name: Notify build success
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Print success message
        run: |
          echo "Image built and pushed successfully"
          echo "Tag: ${{ needs.build-and-push.outputs.image_tag }}"
          echo "Registry: rg.${{ env.SCW_REGION }}.scw.cloud/${{ env.REGISTRY_NAMESPACE }}/${{ env.IMAGE_NAME }}"
name: Deploy to Scaleway

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_all:
        description: "Forcer le rebuild des deux services (ignorer le filtre de chemins)"
        type: boolean
        default: false

# Un seul déploiement à la fois par branche : un nouveau push annule proprement
# le run précédent encore en cours (évite les annulations parasites et les builds
# concurrents lors de pushs rapprochés).
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  SCW_REGION: fr-par
  REGISTRY_NAMESPACE: pipeline-app
  # Identifiants Docker Hub (optionnels). S'ils sont définis en secrets, les jobs
  # s'authentifient au Docker Hub avant le build → évite le rate-limit des pulls
  # anonymes qui fait échouer le boot du builder BuildKit ("registry-1.docker.io timeout").
  # S'ils sont absents, le login est sauté et le comportement reste inchangé.
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1) Détecter quels services doivent être reconstruits
  # ──────────────────────────────────────────────────────────────
  changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      pipeline: ${{ steps.filter.outputs.pipeline }}
      propale: ${{ steps.filter.outputs.propale }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # Si le workflow lui-même change, on force les deux (via les deux filtres).
          # propale-service : uniquement le dossier dédié.
          # pipeline-app    : tout le reste (racine, code serveur, front), hors propale-service.
          filters: |
            propale:
              - 'propale-service/**'
              - '.github/workflows/**'
            pipeline:
              - '**'
              - '!propale-service/**'

  # ──────────────────────────────────────────────────────────────
  # 1bis) Tests front (Vitest) — bloque le déploiement pipeline-app si un test casse
  # ──────────────────────────────────────────────────────────────
  test-pipeline:
    name: Run pipeline-app tests
    needs: changes
    if: ${{ needs.changes.outputs.pipeline == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_all) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ──────────────────────────────────────────────────────────────
  # 2) Build & push pipeline-app (avec retry)
  # ──────────────────────────────────────────────────────────────
  build-and-push-pipeline:
    name: Build and push pipeline-app image
    needs: [changes, test-pipeline]
    if: ${{ needs.changes.outputs.pipeline == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_all) }}
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Authentification Docker Hub (si secrets présents) AVANT le boot du builder :
      # le pull de l'image moby/buildkit devient authentifié → plus de rate-limit/timeout.
      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: image
        run: echo "tag=$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: rg.${{ env.SCW_REGION }}.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build and push pipeline-app image (retry on transient registry errors)
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          timeout_minutes: 20
          retry_wait_seconds: 30
          # On retente sur les erreurs réseau/registry typiques (502, timeouts, EOF…)
          command: |
            docker buildx build \
              --push \
              --tag rg.${{ env.SCW_REGION }}.scw.cloud/${{ env.REGISTRY_NAMESPACE }}/pipeline-app:${{ steps.image.outputs.tag }} \
              --tag rg.${{ env.SCW_REGION }}.scw.cloud/${{ env.REGISTRY_NAMESPACE }}/pipeline-app:latest \
              .

  # ──────────────────────────────────────────────────────────────
  # 3) Build & push propale-service (avec retry)
  # ──────────────────────────────────────────────────────────────
  build-and-push-propale-service:
    name: Build and push propale-service image
    needs: changes
    if: ${{ needs.changes.outputs.propale == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_all) }}
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Authentification Docker Hub (si secrets présents) AVANT le boot du builder :
      # le pull de l'image moby/buildkit devient authentifié → plus de rate-limit/timeout.
      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: image
        run: echo "tag=$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: rg.${{ env.SCW_REGION }}.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build and push propale-service image (retry on transient registry errors)
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          timeout_minutes: 20
          retry_wait_seconds: 30
          command: |
            docker buildx build \
              --push \
              --tag rg.${{ env.SCW_REGION }}.scw.cloud/${{ env.REGISTRY_NAMESPACE }}/propale-service:${{ steps.image.outputs.tag }} \
              --tag rg.${{ env.SCW_REGION }}.scw.cloud/${{ env.REGISTRY_NAMESPACE }}/propale-service:latest \
              ./propale-service

  # ──────────────────────────────────────────────────────────────
  # 4) Récapitulatif (ne casse pas si un service a été skippé)
  # ──────────────────────────────────────────────────────────────
  notify-success:
    name: Notify build success
    needs:
      - build-and-push-pipeline
      - build-and-push-propale-service
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          PIPELINE="${{ needs.build-and-push-pipeline.result }}"
          PROPALE="${{ needs.build-and-push-propale-service.result }}"
          echo "pipeline-app    : $PIPELINE (tag: ${{ needs.build-and-push-pipeline.outputs.image_tag }})"
          echo "propale-service : $PROPALE (tag: ${{ needs.build-and-push-propale-service.outputs.image_tag }})"
          echo "Registry: rg.${{ env.SCW_REGION }}.scw.cloud/${{ env.REGISTRY_NAMESPACE }}/"

          # Échec réel uniquement si un job a vraiment échoué (failure).
          # 'skipped' = service non concerné par ce push → OK.
          if [ "$PIPELINE" = "failure" ] || [ "$PROPALE" = "failure" ]; then
            echo "::error::Au moins un build a échoué."
            exit 1
          fi
          echo "Déploiement OK (les services skippés n'avaient pas de changement)."

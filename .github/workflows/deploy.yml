name: Deploy to Scaleway

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  SCW_REGION: fr-par
  REGISTRY_NAMESPACE: pipeline-app

jobs:
  build-and-push-pipeline:
    name: Build and push pipeline-app image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: image
        run: echo "tag=$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: rg.${{ env.SCW_REGION }}.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build and push pipeline-app image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            rg.${{ env.SCW_REGION }}.scw.cloud/${{ env.REGISTRY_NAMESPACE }}/pipeline-app:${{ steps.image.outputs.tag }}
            rg.${{ env.SCW_REGION }}.scw.cloud/${{ env.REGISTRY_NAMESPACE }}/pipeline-app:latest

  build-and-push-propale-service:
    name: Build and push propale-service image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: image
        run: echo "tag=$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: rg.${{ env.SCW_REGION }}.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build and push propale-service image
        uses: docker/build-push-action@v5
        with:
          context: ./propale-service
          push: true
          tags: |
            rg.${{ env.SCW_REGION }}.scw.cloud/${{ env.REGISTRY_NAMESPACE }}/propale-service:${{ steps.image.outputs.tag }}
            rg.${{ env.SCW_REGION }}.scw.cloud/${{ env.REGISTRY_NAMESPACE }}/propale-service:latest

  notify-success:
    name: Notify build success
    needs:
      - build-and-push-pipeline
      - build-and-push-propale-service
    runs-on: ubuntu-latest
    steps:
      - name: Print success message
        run: |
          echo "Both images built and pushed successfully"
          echo "pipeline-app tag: ${{ needs.build-and-push-pipeline.outputs.image_tag }}"
          echo "propale-service tag: ${{ needs.build-and-push-propale-service.outputs.image_tag }}"
          echo "Registry: rg.${{ env.SCW_REGION }}.scw.cloud/${{ env.REGISTRY_NAMESPACE }}/"
